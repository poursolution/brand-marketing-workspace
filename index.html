<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드 마케팅팀 워크스페이스</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --bg-2: #efece4;
    --surface: #ffffff;
    --surface-soft: #faf8f3;
    --text: #1a1a1a;
    --text-muted: #6b6862;
    --text-light: #9c9892;
    --border: #e7e3da;
    --border-strong: #d4cfc2;
    --primary: #2a2a5e;
    --primary-hover: #383873;
    --primary-soft: #ecebf5;
    --accent: #b8954a;
    --success: #527a4e;
    --success-soft: #e6efe1;
    --warning: #b07433;
    --warning-soft: #f6ebd9;
    --danger: #b14242;
    --danger-soft: #f5e1de;
    --info: #4a6b88;
    --info-soft: #e2eaf2;
    --shadow-sm: 0 1px 2px rgba(20,20,20,0.04);
    --shadow-md: 0 2px 10px rgba(20,20,20,0.06);
    --shadow-lg: 0 12px 32px rgba(20,20,20,0.10);
    --radius: 8px;
    --radius-lg: 14px;
  }

  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  button, input, textarea, select { font: inherit; color: inherit; }
  button { cursor: pointer; border: none; background: none; }
  a { color: inherit; text-decoration: none; }

  /* === Setup & Login === */
  .center-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: linear-gradient(140deg, var(--bg) 0%, var(--bg-2) 100%);
  }
  .card-shell {
    width: 100%; max-width: 520px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 40px; box-shadow: var(--shadow-lg);
  }
  .card-shell h1 {
    font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.01em;
  }
  .card-shell .sub { color: var(--text-muted); margin-bottom: 28px; font-size: 13px; }
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.02em;
  }
  .form-row input, .form-row textarea, .form-row select {
    width: 100%; padding: 10px 12px; background: var(--surface-soft);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; transition: all 0.15s;
  }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
    outline: none; border-color: var(--primary); background: white;
    box-shadow: 0 0 0 3px rgba(42,42,94,0.08);
  }
  .form-row textarea { min-height: 80px; resize: vertical; font-family: inherit; }
  .form-row.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row.row-2 > div { display: flex; flex-direction: column; }
  .form-row.row-2 > div > label { display: block; }
  .member-input { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .member-input .swatch {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 13px;
  }
  .member-input input { flex: 1; }
  .member-input select { width: 100px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600;
    transition: all 0.15s; border: 1px solid transparent;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg); border-color: var(--border-strong); }
  .btn-ghost { color: var(--text-muted); padding: 6px 10px; }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }
  .btn-danger { background: var(--danger-soft); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }
  .btn-block { width: 100%; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .login-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;
  }
  .member-card {
    padding: 20px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface-soft); cursor: pointer; transition: all 0.15s;
    text-align: center;
  }
  .member-card:hover {
    border-color: var(--primary); background: white; transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .member-card .avatar-lg {
    width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 20px;
  }
  .member-card .mname { font-weight: 600; margin-bottom: 2px; }
  .member-card .mrole { font-size: 12px; color: var(--text-muted); }

  /* === App Layout === */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; background: var(--bg-2); border-right: 1px solid var(--border);
    padding: 20px 12px; flex-shrink: 0;
    /* Stick to viewport so user chip is always visible */
    position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar .brand {
    padding: 4px 12px 20px; border-bottom: 1px solid var(--border);
    margin-bottom: 16px; flex-shrink: 0;
  }
  .sidebar .brand-name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .sidebar .brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sidebar nav { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; }
  .sidebar nav::-webkit-scrollbar { width: 4px; }
  .sidebar nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: var(--radius); font-size: 13px; color: var(--text-muted);
    cursor: pointer; margin-bottom: 2px; transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
  .nav-item.active { background: var(--surface); color: var(--primary); font-weight: 600; box-shadow: var(--shadow-sm); }
  .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
  .nav-section-title { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; padding: 14px 12px 6px; }
  .sidebar-footer { border-top: 1px solid var(--border); padding-top: 12px; flex-shrink: 0; }
  .user-chip {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
    min-width: 0;
  }
  .user-chip:hover { background: rgba(0,0,0,0.04); }
  .user-chip .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 12px; flex-shrink: 0; }
  .user-chip .uinfo { min-width: 0; flex: 1; overflow: hidden; }
  .user-chip .uname { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-chip .urole { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .main { flex: 1; min-width: 0; overflow-x: hidden; }
  .topbar {
    padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content { padding: 28px 32px 60px; }

  /* === Components === */
  .avatar { display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; color: white; font-weight: 600; font-size: 11px; flex-shrink: 0; }
  .avatar-stack { display: flex; }
  .avatar-stack .avatar { border: 2px solid var(--surface); margin-left: -6px; }
  .avatar-stack .avatar:first-child { margin-left: 0; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px;
    border-radius: 999px; font-size: 11px; font-weight: 600; line-height: 1.4;
  }
  .badge-gray { background: var(--bg-2); color: var(--text-muted); }
  .badge-blue { background: var(--info-soft); color: var(--info); }
  .badge-green { background: var(--success-soft); color: var(--success); }
  .badge-orange { background: var(--warning-soft); color: var(--warning); }
  .badge-red { background: var(--danger-soft); color: var(--danger); }
  .brand-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; border: 1px solid; line-height: 1.5; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 20px; box-shadow: var(--shadow-sm);
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-weight: 700; font-size: 15px; }
  .card-sub { font-size: 12px; color: var(--text-muted); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 18px 20px; box-shadow: var(--shadow-sm);
  }
  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 12px; }

  .progress { width: 100%; height: 6px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--primary); transition: width 0.3s; }
  .progress-bar.success { background: var(--success); }
  .progress-bar.warning { background: var(--warning); }
  .progress-bar.danger { background: var(--danger); }

  /* === List items === */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; transition: all 0.15s;
  }
  .list-item:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
  .list-item.readonly { cursor: default; }
  .list-item.readonly:hover { border-color: var(--border); box-shadow: none; }
  .list-item .li-main { flex: 1; min-width: 0; }
  .list-item .li-title { font-weight: 600; font-size: 13.5px; margin-bottom: 2px; }
  .list-item .li-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .list-item .li-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .empty {
    text-align: center; padding: 48px 24px; color: var(--text-muted);
    background: var(--surface-soft); border: 1px dashed var(--border-strong);
    border-radius: var(--radius-lg);
  }
  .empty .ei { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

  /* === Filters === */
  .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-chip {
    padding: 6px 12px; border-radius: 999px; background: var(--surface);
    border: 1px solid var(--border); font-size: 12px; font-weight: 500; cursor: pointer;
    color: var(--text-muted); transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* === Section header === */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 16px; font-weight: 700; }
  .section-meta { font-size: 12px; color: var(--text-muted); }

  /* === Modal === */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(20,20,20,0.4); backdrop-filter: blur(4px);
    z-index: 100; display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 20px 20px; overflow-y: auto;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); width: 100%;
    max-width: 560px; box-shadow: var(--shadow-lg); overflow: hidden;
  }
  .modal.lg { max-width: 760px; }
  .modal-header {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-weight: 700; font-size: 16px; }
  .modal-body { padding: 20px 24px; max-height: calc(100vh - 240px); overflow-y: auto; }
  .modal-footer {
    padding: 14px 24px; border-top: 1px solid var(--border); background: var(--surface-soft);
    display: flex; justify-content: space-between; gap: 8px; align-items: center;
  }
  .modal-footer .left { display: flex; gap: 8px; }
  .modal-footer .right { display: flex; gap: 8px; }

  /* === KPI === */
  .kpi-card { padding: 20px; }
  .kpi-card .ktitle { font-weight: 700; margin-bottom: 4px; }
  .kpi-card .kperiod { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }
  .kpi-card .kvalue { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
  .kpi-card .knum { font-size: 24px; font-weight: 700; }
  .kpi-card .ktarget { color: var(--text-muted); font-size: 13px; }
  .kpi-card .kpct { font-size: 12px; font-weight: 600; margin-top: 6px; }

  /* === Detail panes === */
  .meta-list { display: grid; grid-template-columns: 100px 1fr; gap: 8px 16px; font-size: 13px; }
  .meta-list dt { color: var(--text-muted); font-weight: 500; }
  .meta-list dd { color: var(--text); }

  .linked-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .linked-pill {
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
    background: var(--bg-2); border-radius: 6px; font-size: 12px;
  }

  .checkbox-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .checkbox-row input { width: 16px; height: 16px; }
  .checkbox-row label { font-size: 13px; cursor: pointer; }

  /* Attendee chips grid */
  .attendees-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  @media (max-width: 500px) { .attendees-grid { grid-template-columns: 1fr; } }
  .attendee-chip { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.12s; background: var(--surface); font-size: 13px; user-select: none; }
  .attendee-chip input[type="checkbox"] { width: 16px !important; height: 16px !important; margin: 0 !important; padding: 0 !important; flex-shrink: 0; accent-color: var(--primary); cursor: pointer; }
  .attendee-chip:hover { border-color: var(--border-strong); }
  .attendee-chip:has(input:checked) { background: var(--primary-soft); border-color: var(--primary); }
  .attendee-chip .name { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attendees-toolbar { display: flex; gap: 6px; margin-bottom: 6px; }
  .attendees-toolbar button { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: var(--bg-2); color: var(--text-muted); }
  .attendees-toolbar button:hover { background: var(--border); color: var(--text); }

  /* Action items (fixed grid layout) */
  .action-item-row { display: grid !important; grid-template-columns: 22px 1fr 130px 32px 32px; gap: 10px; align-items: center; padding: 8px 12px; background: var(--surface-soft); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
  .action-item-row > input[type="checkbox"] { width: 18px !important; height: 18px !important; margin: 0 !important; padding: 0 !important; accent-color: var(--primary); cursor: pointer; }
  .action-item-row input[type="text"] { width: 100% !important; padding: 8px 10px !important; border: 1px solid var(--border) !important; border-radius: 6px !important; font-size: 13px !important; background: white !important; min-width: 0; }
  .action-item-row select { width: 100% !important; padding: 7px 8px !important; border: 1px solid var(--border) !important; border-radius: 6px !important; font-size: 12px !important; background: white !important; min-width: 0; }
  .action-item-row button { width: 30px !important; height: 30px !important; padding: 0 !important; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 13px; background: white; border: 1px solid var(--border) !important; }
  .action-item-row button:hover { background: var(--bg-2); }
  @media (max-width: 600px) {
    .action-item-row { grid-template-columns: 22px 1fr 32px 32px; }
    .action-item-row select { display: none; }
  }

  .action-item-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; }
  .action-item-row input[type="text"] { flex: 1; }

  /* === Mobile === */
  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; flex-direction: row; padding: 12px; gap: 8px; overflow-x: auto; overflow-y: visible; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar .brand { display: none; }
    .sidebar nav { display: flex; gap: 4px; flex: 1; overflow-y: visible; overflow-x: auto; }
    .nav-section-title { display: none; }
    .nav-item { white-space: nowrap; padding: 8px 10px; }
    .nav-item .label { display: none; }
    .nav-item .icon { font-size: 18px; }
    .nav-section-title { display: none; }
    .sidebar-footer { border-top: none; padding: 0; }
    .topbar { padding: 14px 16px; }
    .topbar h1 { font-size: 17px; }
    .content { padding: 16px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .login-grid { grid-template-columns: 1fr; }
    .form-row.row-2 { grid-template-columns: 1fr; }
    .card-shell { padding: 24px; }
  }

  /* === Loading === */
  .loading { padding: 60px; text-align: center; color: var(--text-muted); }

  /* === Tasks Page Redesign === */
  .tasks-page { display: grid; grid-template-columns: 260px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 900px) { .tasks-page { grid-template-columns: 1fr; } }
  .tps-side { display: flex; flex-direction: column; gap: 14px; }
  @media (min-width: 901px) { .tps-side { position: sticky; top: 82px; } }
  .tps-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }

  .cal-head { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; margin-bottom: 6px; font-weight: 700; font-size: 13px; }
  .cal-head button { width: 22px; height: 22px; border-radius: 6px; color: var(--text-muted); font-size: 14px; }
  .cal-head button:hover { background: var(--bg-2); color: var(--text); }
  .cal-wd { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 10.5px; color: var(--text-muted); font-weight: 600; padding: 4px 0; }
  .cal-wd .sun { color: #c84362; }
  .cal-wd .sat { color: #3a7bc8; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell { aspect-ratio: 1; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.12s; color: var(--text); }
  .cal-cell:hover { background: var(--bg-2); }
  .cal-cell.muted { color: #cbc9c5; cursor: default; }
  .cal-cell.muted:hover { background: transparent; }
  .cal-cell.sun:not(.muted) { color: #c84362; }
  .cal-cell.sat:not(.muted) { color: #3a7bc8; }
  .cal-cell.today { background: var(--primary); color: white !important; font-weight: 700; }
  .cal-cell.selected:not(.today) { outline: 2px solid var(--primary); outline-offset: -2px; font-weight: 700; }

  .prog-title { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
  .prog-num { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; }
  .prog-frac { font-size: 12px; color: var(--text-muted); float: right; margin-top: 10px; }
  .prog-bar { margin-top: 8px; height: 4px; background: var(--bg-2); border-radius: 4px; overflow: hidden; }
  .prog-bar > div { height: 100%; background: var(--primary); transition: width 0.3s; }

  .note-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; font-weight: 700; }
  .note-head .emj { margin-right: 4px; }
  .note-textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; padding: 8px; font-family: inherit; resize: vertical; min-height: 56px; background: white; line-height: 1.5; }
  .note-textarea:focus { outline: none; border-color: var(--primary); }
  .note-textarea.pinned { min-height: 260px; font-size: 13px; line-height: 1.6; }
  .pin-memo { background: #fffbeb; border-color: #fde68a; }
  .pin-memo .note-textarea { background: #fffef5; border-color: #fcd34d40; }

// ====== STORAGE ======
// Storage adapter: Firebase Firestore (primary), Claude window.storage, or localStorage fallback
const hasClaudeStorage = typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function';
const hasFirebase = !!firebaseDB;

// In-memory cache & write debouncing
let _saveTimer = null;
let _pendingState = null;
const FIRESTORE_DOC = 'workspace/main'; // single doc holds entire state

const storageAdapter = {
  async get(key) {
    if (hasFirebase) {
      try {
        const doc = await firebaseDB.doc(FIRESTORE_DOC).get();
        if (doc.exists) {
          const d = doc.data();
          if (d && d.json) return { value: d.json };
        }
        return null;
      } catch (e) {
        console.warn('Firestore get failed, falling back', e);
      }
    }
    if (hasClaudeStorage) {
      try { return await window.storage.get(key, true); }
      catch { return null; }
    }
    try {
      const v = localStorage.getItem(key);
      return v ? { value: v } : null;
    } catch { return null; }
  },
  async set(key, value) {
    if (hasFirebase) {
      // Debounce writes to Firestore (avoid hammering on every keystroke)
      _pendingState = value;
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(async () => {
        try {
          await firebaseDB.doc(FIRESTORE_DOC).set({
            json: _pendingState,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
        } catch (e) {
          console.warn('Firestore set failed', e);
        }
        _pendingState = null;
      }, 400);
      // Also keep a local copy as backup
      try { localStorage.setItem(key + '::backup', value); } catch {}
      return;
    }
    if (hasClaudeStorage) {
      try { await window.storage.set(key, value, true); }
      catch (e) { console.warn('Storage set failed', e); }
    } else {
      try { localStorage.setItem(key, value); }
      catch (e) { console.warn('localStorage set failed', e); }
    }
  },
  async getSession(key) {
    // Session (which user am I) is always per-browser, never synced
    if (hasClaudeStorage) {
      try { return await window.storage.get(key, false); }
      catch { return null; }
    }
    try {
      const v = localStorage.getItem(key + '::session');
      return v ? { value: v } : null;
    } catch { return null; }
  },
  async setSession(key, value) {
    if (hasClaudeStorage) {
      try { await window.storage.set(key, value, false); }
      catch {}
    } else {
      try { localStorage.setItem(key + '::session', value); } catch {}
    }
  },
  // Subscribe to realtime updates from other team members
  subscribe(onUpdate) {
    if (!hasFirebase) return null;
    return firebaseDB.doc(FIRESTORE_DOC).onSnapshot(doc => {
      if (doc.exists && doc.metadata.hasPendingWrites === false) {
        const d = doc.data();
        if (d && d.json) onUpdate(d.json);
      }
    }, err => console.warn('Realtime sub error', err));
  },
};

async function loadState() {

  state.meetings.forEach(m => {
    if (!('projectId' in m)) m.projectId = null;
  });
}

async function rolloverTasks() {
  const today = todayStr();
  if (state.lastRolloverDate === today) return;
  let changed = 0;
  state.tasks.forEach(t => {
    const isOneoff = (t.type === 'oneoff' || !t.type);
    if (isOneoff && t.status !== 'done' && t.date && t.date < today) {
      if (!t.originalDate) t.originalDate = t.date;
      t.date = today;
      t.updatedAt = now();
      changed++;
    }
  });
  state.lastRolloverDate = today;
  if (changed > 0) logAct(`${changed}개 업무가 오늘로 이월됨`);
  await saveState();
}

// ====== IMAGE UTILITIES ======
// Compress an image File/Blob to JPEG base64, max dimension 1200px, quality 0.82
function compressImage(fileOrBlob, maxDim = 1200, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) {
            height = Math.round(height * (maxDim / width));
            width = maxDim;
          } else {
            width = Math.round(width * (maxDim / height));
            height = maxDim;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        // JPEG with quality. PNG transparency lost — that's fine for screenshots.
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(fileOrBlob);
  });
}

// Lightbox: show image full-screen

  `;

  document.addEventListener('keydown', escHandler);
  // Don't close when clicking on the image itself? Actually, the example asks "click anywhere", so we keep it simple.
  // Stop propagation on image so user can right-click → save without closing
  lb.querySelector('img').addEventListener('click', (e) => { e.stopPropagation(); close(); });
}

// In-flight pending images for note editor (per project)
const pendingNoteImages = {}; // { [projectId]: [dataUrl, ...] }

async function handleNoteImageFiles(projectId, files) {
  if (!files || !files.length) return;
  pendingNoteImages[projectId] = pendingNoteImages[projectId] || [];
  const wrap = document.getElementById('pj-note-pending');
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    try {
      const dataUrl = await compressImage(file);
      pendingNoteImages[projectId].push(dataUrl);
      renderPendingImages(projectId);
    } catch (e) {
      console.warn('Image compress failed', e);
    }
  }
}

function renderPendingImages(projectId) {
  const wrap = document.getElementById('pj-note-pending');
  if (!wrap) return;
  const arr = pendingNoteImages[projectId] || [];
  wrap.innerHTML = arr.map((src, i) => `
    <div class="pj-note-pending-item">
      <img src="${src}" alt="">
      <button type="button" class="pp-remove" onclick="window.removePendingImage('${projectId}', ${i})">✕</button>
    </div>
  `).join('');
  wrap.style.display = arr.length ? 'flex' : 'none';
}

window.removePendingImage = function(projectId, idx) {
  if (!pendingNoteImages[projectId]) return;
  pendingNoteImages[projectId].splice(idx, 1);
  renderPendingImages(projectId);
};

// Wire up paste & drag-drop after notes UI renders
function attachNoteEditorEvents(projectId) {
  const editor = document.querySelector('.pj-note-editor');
  const textarea = document.getElementById('pj-note-input');
  if (!editor || !textarea) return;

  // Paste handler (Ctrl+V images)
  textarea.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    const files = [];
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) files.push(file);
      }
    }
    if (files.length) {
      e.preventDefault();
      handleNoteImageFiles(projectId, files);
    }
  });

  // Drag & drop on editor
  editor.addEventListener('dragover', (e) => {
    e.preventDefault();
    editor.classList.add('dragover');
  });
  editor.addEventListener('dragleave', (e) => {
    if (e.target === editor) editor.classList.remove('dragover');
  });
  editor.addEventListener('drop', (e) => {
    e.preventDefault();
    editor.classList.remove('dragover');
    const files = [...(e.dataTransfer?.files || [])].filter(f => f.type.startsWith('image/'));
    if (files.length) handleNoteImageFiles(projectId, files);
  });
}

function projectProgress(projectId) {
  const tasks = state.tasks.filter(t => t.projectId === projectId);
  if (!tasks.length) return 0;
  const done = tasks.filter(t => t.status === 'done').length;
  return Math.round(done / tasks.length * 100);
}

// KPI progress — returns {pct, current, target, unit, isAuto}
// Auto mode: derived from linked tasks (done count / total count)
// Manual mode: current/target as entered
function kpiProgress(k) {
  if (!k) return { pct: 0, current: 0, target: 0, unit: '', isAuto: false };
  if (k.mode === 'auto') {
    // Find directly linked tasks
    const directIds = new Set(state.tasks.filter(t => t.kpiId === k.id).map(t => t.id));
    // Find projects linked to this KPI, then include their tasks
    const projectIds = state.projects.filter(p => p.kpiId === k.id).map(p => p.id);
    const projectTaskIds = new Set(
      state.tasks.filter(t => t.projectId && projectIds.includes(t.projectId)).map(t => t.id)
    );
    // Combine (de-dup), then exclude routine tasks (only count one-off project work)
    const allLinked = state.tasks.filter(t => (directIds.has(t.id) || projectTaskIds.has(t.id)) && t.type === 'oneoff');
    const target = allLinked.length;
    // For oneoff tasks, "completion" lives in completions[date] — done if any date is true
    const current = allLinked.filter(t => {
      if (t.status === 'done') return true;
      const c = t.completions || {};
      return Object.values(c).some(v => v === true);
    }).length;
    const pct = target === 0 ? 0 : Math.min(100, Math.round(current/target*100));
    return { pct, current, target, unit: '개', isAuto: true };
  }
  // Manual (default)
  const target = k.target || 0;
  const current = k.current || 0;
  const pct = target === 0 ? 0 : Math.min(100, Math.round(current/target*100));
  return { pct, current, target, unit: k.unit || '', isAuto: false };
}

// ====== TASKS ======
function renderTasks() {
  if (!session.selectedDate) session.selectedDate = todayStr();
  const selDate = session.selectedDate;
  const isToday = selDate === todayStr();
  const q = session.taskSearch || '';

  const myId = session.currentUserId;
  const mine = (t) => t.assigneeId === myId;
  const daily = state.tasks.filter(t => t.type === 'daily' && mine(t) && taskMatchQ(t, q));
  const weekly = state.tasks.filter(t => t.type === 'weekly' && mine(t) && taskMatchQ(t, q));
  const longterm = state.tasks.filter(t => t.type === 'longterm' && mine(t) && taskMatchQ(t, q));
  const oneoff = state.tasks.filter(t => (t.type === 'oneoff' || !t.type) && mine(t) && t.date === selDate && taskMatchQ(t, q));

  const todayList = [...daily, ...weekly, ...oneoff];
  const done = todayList.filter(t => isTaskDoneOn(t, selDate)).length;
  const total = todayList.length;
  const pct = total ? Math.round(done/total*100) : 0;

  return `
    <div class="tasks-page">
      <div class="tps-side">
        <div class="tps-card">${renderCal(selDate)}</div>
        <div class="tps-card">
          <div class="prog-title">${isToday ? '오늘의 진행률' : fmtKoDate(selDate) + ' 진행률'}</div>
          <span class="prog-num">${pct}%</span><span class="prog-frac">${done}/${total} 완료</span>
          <div class="prog-bar"><div style="width:${pct}%"></div></div>
        </div>
        <div class="tps-card pin-memo">
          <div class="note-head"><span><span class="emj">📌</span>고정 메모</span></div>
          <textarea class="note-textarea pinned" data-save-memo="1" placeholder="팀이 공유하는 고정 메모...&#10;&#10;자주 참고할 내용을 자유롭게 기록하세요.">${esc(state.pinnedMemo || '')}</textarea>
        </div>
      </div>
      <div>
        <div class="dh">
          <div class="dhtitle">${fmtKoDate(selDate)}${isToday ? '<span class="today-b">오늘</span>' : ''}</div>
          <button class="btn btn-secondary" data-action="download-weekly">📥 주간업무일지 다운로드</button>
        </div>
        <div class="tsearch"><input type="text" placeholder="업무 검색" value="${esc(q)}" data-search-tasks="1" /></div>
        <div class="r-grid">
          ${renderRoutineCard('daily', '일일 루틴', '☀️', daily, selDate)}
          ${renderRoutineCard('weekly', '주간 루틴', '📅', weekly, selDate)}
          ${renderRoutineCard('longterm', '장기 프로젝트', '🎯', longterm, selDate)}
        </div>
        ${renderMyRequestsCard()}
        ${renderDailyList(oneoff, selDate)}
      </div>
    </div>
  `;
}

function renderMyRequestsCard() {
  const myId = session.currentUserId;
  const myReqs = state.requests.filter(r => r.assigneeId === myId && (r.status === 'received' || r.status === 'doing'));
  if (myReqs.length === 0) return '';

  myReqs.sort((a,b) => {
    // overdue first, then by due date, then by received
    const ad = a.due ? new Date(a.due).getTime() : Infinity;
    const bd = b.due ? new Date(b.due).getTime() : Infinity;
    if (ad !== bd) return ad - bd;
    return new Date(b.received) - new Date(a.received);
  });

  const today = new Date(todayStr());
  return `
    <div class="mr-card">
      <div class="mr-head">
        <div class="mr-title">📥 내가 담당인 타팀 요청 <span class="mr-count">${myReqs.length}</span></div>
        <button class="mr-viewall" data-action="nav" data-view="requests">전체 보기 →</button>
      </div>
      <div class="mr-list">
        ${myReqs.map(r => {
          const overdue = r.due && new Date(r.due) < today;
          return `
            <div class="mr-item">
              <input type="checkbox" data-action="complete-request-quick" data-id="${r.id}" title="완료로 표시">
              <span class="mr-item-title" data-action="open-request" data-id="${r.id}">${esc(r.content)}</span>
              <span class="mr-from">${esc(r.team)}</span>
              <span class="mr-status ${r.status}">${REQ_STATUS[r.status].label}</span>
              <span class="mr-due ${overdue?'overdue':''}">${r.due ? (overdue?'⚠ ':'') + fmtDate(r.due) : '마감 미정'}</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderCal(selDate) {
  const anchor = session.calMonth || selDate;
  const [y, m] = anchor.split('-').map(Number);
  const first = new Date(y, m-1, 1);
  const last = new Date(y, m, 0);
  const pad = first.getDay();
  const total = last.getDate();
  const prevLast = new Date(y, m-1, 0).getDate();
  const cells = [];
  for (let i = pad - 1; i >= 0; i--) cells.push({ day: prevLast - i, muted: true });
  for (let i = 1; i <= total; i++) {
    const date = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    cells.push({ day: i, date });
  }
  while (cells.length % 7 !== 0) cells.push({ day: cells.length - total - pad + 1, muted: true });
  const today = todayStr();
  return `
    <div class="cal-head">
      <button data-action="cal-prev">‹</button>
      <span>${y}년 ${m}월</span>
      <button data-action="cal-next">›</button>
    </div>
    <div class="cal-wd"><span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span></div>
    <div class="cal-grid">
      ${cells.map((c, i) => {
        const dow = i % 7;
        let cls = 'cal-cell';
        if (c.muted) cls += ' muted';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (!c.muted) {
          if (c.date === today) cls += ' today';
          else if (c.date === selDate) cls += ' selected';
        }
        return `<div class="${cls}" ${!c.muted ? `data-action="select-date" data-date="${c.date}"` : ''}>${c.day}</div>`;
      }).join('')}
    </div>
  `;
}

function renderRoutineCard(type, title, icon, tasks, selDate) {
  const done = tasks.filter(t => isTaskDoneOn(t, selDate)).length;
  const total = tasks.length;
  return `
    <div class="r-card ${type}">
      <div class="r-head">
        <span class="r-icon">${icon}</span>
        <span class="r-title">${title}</span>
        <span class="r-count">${done}/${total}</span>
        <span class="spacer"></span>
        <button class="r-add" data-action="new-task-of-type" data-type="${type}">+ 추가</button>
      </div>
      <div class="r-items">
        ${tasks.length === 0 ? `<div class="r-empty">등록된 업무가 없습니다</div>` :
          tasks.map(t => {
            const d = isTaskDoneOn(t, selDate);
            return `
              <div class="r-item">
                <input type="checkbox" ${d ? 'checked' : ''} data-action="toggle-done" data-id="${t.id}" data-date="${selDate}">
                <span class="r-txt ${d ? 'done' : ''}" data-action="open-task" data-id="${t.id}">${esc(t.title)}</span>
                ${brandBadge(t.brandId) || '<span class="brand-pill" style="background:#eee;color:#888;border-color:#ddd">기타</span>'}
                <span class="r-note" data-action="open-task" data-id="${t.id}">📝 기록</span>
                <span class="r-del" data-action="delete-task-quick" data-id="${t.id}">🗑</span>
              </div>
            `;
          }).join('')
        }
      </div>
    </div>
  `;
}

function renderDailyList(tasks, selDate) {
  const sorted = [...tasks].sort((a, b) => {
    const ad = isTaskDoneOn(a, selDate), bd = isTaskDoneOn(b, selDate);
    if (ad !== bd) return ad ? 1 : -1;
    return (a.order || 0) - (b.order || 0);
  });
  return `
    <div class="dt-wrap">
      <div class="dt-head">
        <span></span>
        <span></span>
        <span>업무</span>
        <span class="dh-proj">프로젝트</span>
        <span class="dh-brand">브랜드</span>
        <span class="dh-add"><button data-action="new-task-of-type" data-type="oneoff" data-date="${selDate}">+ 업무 추가</button></span>
      </div>
      ${sorted.length === 0 ? `<div class="dt-empty">이 날의 업무가 없습니다. + 업무 추가로 등록해 보세요.</div>` :
        sorted.map(t => {
          const d = isTaskDoneOn(t, selDate);
          const rolled = t.originalDate && t.originalDate !== t.date && selDate === t.date;
          const proj = t.projectId ? state.projects.find(p => p.id === t.projectId) : null;
          return `
            <div class="dt-row">
              <span class="drag">⋮⋮</span>
              <span class="chk"><input type="checkbox" ${d?'checked':''} data-action="toggle-done" data-id="${t.id}" data-date="${selDate}"></span>
              <span class="t-title ${d?'done':''}" data-action="open-task" data-id="${t.id}">${esc(t.title)}${rolled?`<span style="font-size:10.5px;color:var(--warning);margin-left:6px;font-weight:500">↷ ${t.originalDate.slice(5).replace('-','/')}에서 이월</span>`:''}</span>
              <span class="proj-cell">${proj ? `<span class="t-proj-tag" data-action="goto-project" data-id="${proj.id}" title="프로젝트로 이동">◇ ${esc(proj.name)}</span>` : '<span style="color:var(--text-light);font-size:11px">—</span>'}</span>
              <span class="brand-cell">${brandBadge(t.brandId) || '<span style="color:var(--text-light);font-size:11px">—</span>'}</span>
              <span class="actions">
                <button data-action="toggle-bookmark" data-id="${t.id}" class="${t.bookmark?'bm-on':''}" title="북마크">${t.bookmark?'★':'☆'}</button>
                <button data-action="open-task" data-id="${t.id}" title="수정">✎</button>
                <button data-action="delete-task-quick" data-id="${t.id}" class="del" title="삭제">🗑</button>
              </span>
            </div>
          `;
        }).join('')
      }
    </div>
  `;
}

// ====== PROJECTS ======
function renderProjects() {
  if (!state.projects.length) return `
    ${renderPjFilterBar('mine')}
    <div class="empty"><div class="ei">◇</div>프로젝트가 없어요. + 새 프로젝트로 추가해 보세요.</div>
  `;

  // Default filter: 'mine' (my projects). Falls back to first brand.
  let f = session.projectBrandFilter;
  if (!f || (f !== 'done' && f !== 'paused' && f !== 'all' && f !== 'mine' && !state.brands.find(b => b.id === f))) {
    f = 'mine';
    session.projectBrandFilter = f;
  }
  const meId = session.currentUserId;
  const myProjectIds = new Set(state.tasks.filter(t => t.assigneeId === meId).map(t => t.projectId).filter(Boolean));
  // Per-user hidden projects
  const hiddenSet = new Set(state.hiddenProjectsByUser?.[meId] || []);
  let filtered;
  let hiddenCount = 0;
  if (f === 'done') {
    filtered = state.projects.filter(p => p.status === 'done');
  } else if (f === 'paused') {
    filtered = state.projects.filter(p => p.status === 'paused');
  } else if (f === 'all') {
    filtered = state.projects.filter(p => p.status === 'active');
  } else if (f === 'mine') {
    const allMine = state.projects.filter(p => p.status === 'active' && myProjectIds.has(p.id));
    if (session.showHiddenInMine) {
      filtered = allMine; // show all including hidden
    } else {
      filtered = allMine.filter(p => !hiddenSet.has(p.id));
      hiddenCount = allMine.length - filtered.length;
    }
  } else {
    filtered = state.projects.filter(p => p.brandId === f && p.status === 'active');
  }

  if (!session.selectedProjectId || !filtered.find(p => p.id === session.selectedProjectId)) {
    session.selectedProjectId = filtered[0]?.id || null;
  }

  // === DONE / PAUSED VIEW: extra filtering by brand + search ===
  let doneSearchHtml = '';
  if (f === 'done' || f === 'paused') {
    const doneBrandFilter = session.doneBrandFilter || 'all';
    const doneSearch = (session.doneSearch || '').toLowerCase();
    const isPaused = f === 'paused';
    const placeholderText = isPaused ? '보류된 프로젝트 검색 (이름·설명)' : '완료된 프로젝트 검색 (이름·설명)';

    // Apply sub-filters
    let beforeFilter = filtered;
    if (doneBrandFilter !== 'all') {
      filtered = filtered.filter(p => p.brandId === doneBrandFilter);
    }
    if (doneSearch) {
      filtered = filtered.filter(p =>
        p.name?.toLowerCase().includes(doneSearch) ||
        p.desc?.toLowerCase().includes(doneSearch)
      );
    }

    // Brand counts
    const brandCounts = { all: beforeFilter.length };
    state.brands.forEach(b => {
      brandCounts[b.id] = beforeFilter.filter(p => p.brandId === b.id).length;
    });
    const noneCnt = beforeFilter.filter(p => !p.brandId).length;

    doneSearchHtml = `
      <div class="done-controls">
        <div class="done-search-wrap">
          <span class="done-search-icon">🔍</span>
          <input type="text" class="done-search" placeholder="${placeholderText}" value="${esc(session.doneSearch || '')}" oninput="window.handleDoneSearch(this.value)" autofocus>
          ${doneSearch ? `<button class="done-search-clear" onclick="window.handleDoneSearch('')" title="지우기">✕</button>` : ''}
        </div>
        <div class="done-brand-chips">
          <span class="done-chip ${doneBrandFilter==='all'?'active':''}" data-action="done-brand-filter" data-id="all">전체<span class="done-chip-count">${brandCounts.all}</span></span>
          ${state.brands.filter(b => brandCounts[b.id] > 0).map(b => `
            <span class="done-chip ${doneBrandFilter===b.id?'active':''}" data-action="done-brand-filter" data-id="${b.id}" style="${doneBrandFilter===b.id?`background:${b.color};border-color:${b.color};color:white`:`color:${b.color};border-color:${b.color}66`}">${esc(b.name)}<span class="done-chip-count">${brandCounts[b.id]}</span></span>
          `).join('')}
          ${noneCnt > 0 ? `<span class="done-chip ${doneBrandFilter==='__none__'?'active':''}" data-action="done-brand-filter" data-id="__none__">미지정<span class="done-chip-count">${noneCnt}</span></span>` : ''}
        </div>
      </div>
    `;

    if (!session.selectedProjectId || !filtered.find(p => p.id === session.selectedProjectId)) {
      session.selectedProjectId = filtered[0]?.id || null;
    }
  }

  if (filtered.length === 0) {
    let msg;
    if (f === 'done') {
      const hasSearch = session.doneSearch || (session.doneBrandFilter && session.doneBrandFilter !== 'all');
      msg = hasSearch ? '검색 결과가 없어요. 다른 키워드를 시도해보세요.' : '완료된 프로젝트가 아직 없어요.';
    }
    else if (f === 'paused') {
      const hasSearch = session.doneSearch || (session.doneBrandFilter && session.doneBrandFilter !== 'all');
      msg = hasSearch ? '검색 결과가 없어요. 다른 키워드를 시도해보세요.' : '보류 중인 프로젝트가 없어요.';
    }
    else if (f === 'all') msg = '진행 중인 프로젝트가 없어요.';
    else if (f === 'mine') {
      msg = hiddenCount > 0
        ? `숨긴 프로젝트 ${hiddenCount}개를 제외하면 보일 프로젝트가 없어요.`
        : '내가 담당하는 프로젝트가 없어요. 다른 브랜드 칩을 눌러서 보세요.';
    }
    else { const b = brand(f); msg = `${b ? esc(b.name) + ' 브랜드' : '선택한 필터'}의 진행 중 프로젝트가 없어요.`; }
    return `${renderPjFilterBar(f)}${doneSearchHtml}${f === 'mine' && hiddenCount > 0 ? renderHiddenToggle(hiddenCount, false) : ''}<div class="empty"><div class="ei">◇</div>${msg}</div>`;
  }

  // === MINE VIEW: brand-grouped accordion sidebar ===
  if (f === 'mine') {
    const selected = filtered.find(p => p.id === session.selectedProjectId);
    return `
      ${renderPjFilterBar(f)}
      ${renderHiddenToggle(hiddenCount, !!session.showHiddenInMine)}
      <div class="pj-page">${renderPjSidebarGrouped(selected, filtered, hiddenSet)}${renderPjDetail(selected)}</div>
    `;
  }

  const selected = filtered.find(p => p.id === session.selectedProjectId);
  return `
    ${renderPjFilterBar(f)}
    ${doneSearchHtml}
    <div class="pj-page">${renderPjSidebar(selected, filtered, f)}${renderPjDetail(selected)}</div>
  `;
}

// Toggle button for showing hidden projects in 내 프로젝트
function renderHiddenToggle(hiddenCount, isShowingHidden) {
  if (hiddenCount === 0 && !isShowingHidden) return '';
  if (isShowingHidden) {
    return `
      <div class="hidden-toggle-bar">
        <span class="hidden-toggle-info">👁 숨긴 프로젝트도 함께 보고 있어요</span>
        <button class="btn btn-secondary btn-sm" data-action="toggle-show-hidden">숨기기</button>
      </div>
    `;
  }
  return `
    <div class="hidden-toggle-bar">
      <span class="hidden-toggle-info">🙈 숨긴 프로젝트 ${hiddenCount}개</span>
      <button class="btn btn-secondary btn-sm" data-action="toggle-show-hidden">보기</button>
    </div>
  `;
}

// Sidebar grouped by brand (for 내 프로젝트 view)
function renderPjSidebarGrouped(selected, projects, hiddenSet) {
  // Group projects by brand
  const byBrand = {}; // brandId -> [projects]
  const noBrand = [];
  projects.forEach(p => {
    if (p.brandId) {
      if (!byBrand[p.brandId]) byBrand[p.brandId] = [];
      byBrand[p.brandId].push(p);
    } else {
      noBrand.push(p);
    }
  });

  // Brand groups in state.brands order; only brands that have projects
  const brandGroups = state.brands
    .filter(b => byBrand[b.id]?.length > 0)
    .map(b => ({ brand: b, projects: byBrand[b.id] }));

  // Collapse state per brand (transient, in-memory; defaults to expanded)
  window._mineBrandCollapsed = window._mineBrandCollapsed || new Set();
  const collapsedSet = window._mineBrandCollapsed;

  function projItemHtml(p) {
    const tasks = state.tasks.filter(t => t.projectId === p.id);
    const done = tasks.filter(t => isTaskDoneOn(t, todayStr())).length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const isHidden = hiddenSet.has(p.id);
    return `
      <div class="pj-list-item ${selected && p.id === selected.id ? 'active' : ''} ${isHidden ? 'is-hidden' : ''}" data-action="select-project" data-id="${p.id}">
        <div class="pji-title-row">
          <span class="pji-dot"${isHidden?' style="background:var(--text-light)"':''}></span>
          <span class="pji-title">${esc(p.name)}${isHidden?' <span class="pji-hidden-tag">숨김</span>':''}</span>
          <span class="pji-action-btn" data-action="${isHidden?'unhide-project':'hide-project'}" data-id="${p.id}" title="${isHidden?'다시 보이기':'숨기기'}">${isHidden?'👁':'🙈'}</span>
        </div>
        <div class="pji-progress">
          <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
          <span class="pji-progress-text">${done}/${tasks.length}</span>
        </div>
      </div>
    `;
  }

  return `
    <aside class="pj-sidebar">
      <div class="pj-sidebar-head">⭐ 내 프로젝트</div>
      <div class="pj-sidebar-sub">${projects.length}개 프로젝트</div>
      ${brandGroups.map(g => {
        const isCollapsed = collapsedSet.has(g.brand.id);
        return `
          <div class="pj-brand-group ${isCollapsed?'collapsed':''}">
            <div class="pj-brand-group-head" data-action="toggle-mine-brand" data-id="${g.brand.id}" style="--brand-color:${g.brand.color}">
              <span class="pj-bg-arrow">${isCollapsed?'▶':'▼'}</span>
              <span class="pj-bg-dot" style="background:${g.brand.color}"></span>
              <span class="pj-bg-name">${esc(g.brand.name)}</span>
              <span class="pj-bg-count">${g.projects.length}</span>
            </div>
            ${isCollapsed ? '' : `<div class="pj-brand-group-list">${g.projects.map(projItemHtml).join('')}</div>`}
          </div>
        `;
      }).join('')}
      ${noBrand.length > 0 ? (() => {
        const isCollapsed = collapsedSet.has('__none__');
        return `
          <div class="pj-brand-group ${isCollapsed?'collapsed':''}">
            <div class="pj-brand-group-head" data-action="toggle-mine-brand" data-id="__none__" style="--brand-color:var(--text-light)">
              <span class="pj-bg-arrow">${isCollapsed?'▶':'▼'}</span>
              <span class="pj-bg-dot" style="background:var(--text-light)"></span>
              <span class="pj-bg-name" style="color:var(--text-muted)">미지정</span>
              <span class="pj-bg-count">${noBrand.length}</span>
            </div>
            ${isCollapsed ? '' : `<div class="pj-brand-group-list">${noBrand.map(projItemHtml).join('')}</div>`}
          </div>
        `;
      })() : ''}
    </aside>
  `;
}

function renderPjFilterBar(active) {
  const meId = session.currentUserId;
  const myProjectIds = new Set(state.tasks.filter(t => t.assigneeId === meId).map(t => t.projectId).filter(Boolean));
  const counts = {
    all: state.projects.filter(p => p.status === 'active').length,
    done: state.projects.filter(p => p.status === 'done').length,
    paused: state.projects.filter(p => p.status === 'paused').length,
    mine: state.projects.filter(p => p.status === 'active' && myProjectIds.has(p.id)).length,
  };
  state.brands.forEach(b => { counts[b.id] = state.projects.filter(p => p.brandId === b.id && p.status === 'active').length; });
  return `
    <div class="pj-filter-bar">
      <span class="pj-filter-chip pj-filter-mine ${active==='mine'?'active':''}" data-action="pj-filter" data-brand="mine">⭐ 내 프로젝트<span class="pj-filter-count">${counts.mine}</span></span>
      <span class="pj-filter-divider"></span>
      ${state.brands.map(b => `
        <span class="pj-filter-chip ${active===b.id?'active':''}" data-action="pj-filter" data-brand="${b.id}" style="${active===b.id?`background:${b.color};border-color:${b.color};color:white`:''}">${esc(b.name)}<span class="pj-filter-count">${counts[b.id]}</span></span>
      `).join('')}
      <span class="pj-filter-divider"></span>
      <span class="pj-filter-chip pj-filter-paused ${active==='paused'?'active':''}" data-action="pj-filter" data-brand="paused">⏸ 보류<span class="pj-filter-count">${counts.paused}</span></span>
      <span class="pj-filter-chip pj-filter-done ${active==='done'?'active':''}" data-action="pj-filter" data-brand="done">📦 완료됨<span class="pj-filter-count">${counts.done}</span></span>
    </div>
  `;
}

function renderPjSidebar(selected, projects, filter) {
  const list = projects || state.projects;
  const isDone = filter === 'done';
  const isPaused = filter === 'paused';
  const allProjTasks = state.tasks.filter(t => list.some(p => p.id === t.projectId));
  const allDone = allProjTasks.filter(t => isTaskDoneOn(t, todayStr())).length;
  const headerLabel = isDone ? '📦 완료된 프로젝트' : isPaused ? '⏸ 보류된 프로젝트' : '📁 프로젝트 목록';
  const subUnit = isDone ? '완료' : isPaused ? '보류' : '프로젝트';
  return `
    <aside class="pj-sidebar">
      <div class="pj-sidebar-head">${headerLabel}</div>
      <div class="pj-sidebar-sub">${list.length}개 ${subUnit} · ${allDone}/${allProjTasks.length} 업무 완료</div>
      ${list.length === 0 ? '<div class="pj-sidebar-empty">결과가 없어요</div>' : ''}
      ${list.map(p => {
        const tasks = state.tasks.filter(t => t.projectId === p.id);
        const done = tasks.filter(t => isTaskDoneOn(t, todayStr())).length;
        const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
        const b = brand(p.brandId);
        const dotColor = isDone ? '#9c9a92' : isPaused ? 'var(--warning)' : '';
        return `
          <div class="pj-list-item ${selected && p.id === selected.id ? 'active' : ''}" data-action="select-project" data-id="${p.id}">
            <div class="pji-title-row">
              <span class="pji-dot" style="${dotColor?`background:${dotColor}`:''}"></span>
              <span class="pji-title">${esc(p.name)}</span>
              <span class="pji-del" data-action="delete-project" data-id="${p.id}" title="삭제">✕</span>
            </div>
            <div class="pji-progress">
              <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
              <span class="pji-progress-text">${done}/${tasks.length}</span>
            </div>
            ${b ? `<div class="pji-tags"><span class="pji-tag" style="background:${b.color}18;color:${b.color}">${esc(b.name)}</span></div>` : ''}
          </div>
        `;
      }).join('')}
    </aside>
  `;
}

function renderPjDetail(p) {
  const tab = session.projectTab || 'tasks';
  const tasks = state.tasks.filter(t => t.projectId === p.id);
  const done = tasks.filter(t => isTaskDoneOn(t, todayStr())).length;
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
  const notes = p.notes || [];
  const comments = p.comments || [];
  const meetings = state.meetings.filter(m => m.projectId === p.id);
  const b = brand(p.brandId);

  return `
    <div class="pj-detail">
      <div class="pj-detail-header">
        ${b ? `<div class="pj-breadcrumb"><span class="bc-tag" style="background:${b.color}18;color:${b.color}">${esc(b.name)} ›</span></div>` : ''}
        <div class="pj-detail-title">
          <h1>${esc(p.name)}</h1>
          <div class="badges">
            <span class="badge ${PROJ_STATUS[p.status].cls}">${PROJ_STATUS[p.status].label}</span>
            ${p.status === 'done' ? `
              <button class="btn btn-secondary btn-sm" data-action="reopen-project" data-id="${p.id}">↺ 되돌리기</button>
            ` : p.status === 'paused' ? `
              <button class="btn btn-secondary btn-sm" data-action="resume-project" data-id="${p.id}" style="color:var(--info);border-color:var(--info)">▶ 재개</button>
              <button class="btn btn-secondary btn-sm" data-action="complete-project" data-id="${p.id}" style="color:var(--success);border-color:var(--success)">✓ 완료</button>
            ` : `
              <button class="btn btn-secondary btn-sm" data-action="pause-project" data-id="${p.id}" style="color:var(--warning);border-color:var(--warning)">⏸ 보류</button>
              <button class="btn btn-secondary btn-sm" data-action="complete-project" data-id="${p.id}" style="color:var(--success);border-color:var(--success)">✓ 완료</button>
            `}
            <button class="btn btn-secondary btn-sm" data-action="open-project-modal" data-id="${p.id}">편집</button>
            <button class="btn btn-ghost btn-sm" data-action="delete-project" data-id="${p.id}" style="color:var(--danger)">삭제</button>
          </div>
        </div>
        <div class="pj-detail-meta">
          <div>📅 등록 ${fmtFull(p.createdAt)}</div>
          <div class="pj-detail-progress">진행률<div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div><span class="pj-detail-progress-text">${done}/${tasks.length}</span></div>
          <div class="pj-detail-assignees">👥 담당자 ${(() => {
            const assigneeIds = [...new Set(tasks.map(t => t.assigneeId).filter(Boolean))];
            const activeMembers = state.members.filter(m => assigneeIds.includes(m.id));
            if (activeMembers.length === 0) return '<span style="color:var(--text-muted);font-size:12px;font-weight:400">하위업무 담당자 없음</span>';
            return `<div class="avatar-stack">${activeMembers.map(m => `<span class="avatar" style="background:${m.color}" title="${esc(m.name)}">${esc(initials(m.name))}</span>`).join('')}</div> <span style="font-size:12px;color:var(--text-muted);font-weight:500">${activeMembers.length}명</span>`;
          })()}</div>
        </div>
      </div>
      <div class="pj-tabs">
        <div class="pj-tab ${tab==='tasks'?'active':''}" data-action="pj-tab" data-tab="tasks">하위업무 <span class="pj-tab-count">${tasks.length}</span></div>
        <div class="pj-tab ${tab==='notes'?'active':''}" data-action="pj-tab" data-tab="notes">노트 <span class="pj-tab-count">${notes.length}</span></div>
        <div class="pj-tab ${tab==='comments'?'active':''}" data-action="pj-tab" data-tab="comments">댓글 <span class="pj-tab-count">${comments.length}</span></div>
        <div class="pj-tab ${tab==='meetings'?'active':''}" data-action="pj-tab" data-tab="meetings">회의록 <span class="pj-tab-count">${meetings.length}</span></div>
      </div>
      <div class="pj-tab-content">
        ${tab==='tasks' ? renderPjTasks(p, tasks) : ''}
        ${tab==='notes' ? renderPjNotes(p, notes) : ''}
        ${tab==='comments' ? renderPjComments(p, comments) : ''}
        ${tab==='meetings' ? renderPjMeetings(p, meetings) : ''}
      </div>
    </div>
  `;
}

function renderPjTasks(p, tasks) {
  const sorted = [...tasks].sort((a, b) => {
    const ad = isTaskDoneOn(a, todayStr()), bd = isTaskDoneOn(b, todayStr());
    if (ad !== bd) return ad ? 1 : -1;
    return (a.date || 'z').localeCompare(b.date || 'z');
  });
  return `
    <div class="pj-add-task-wrap">
      <span style="color:var(--text-muted);font-size:16px">+</span>
      <input type="text" placeholder="하위업무 추가 (Enter로 저장)" data-quick-add-task="${p.id}" />
    </div>
    ${sorted.length === 0 ? `<div class="pj-empty-soft"><div class="pei">✓</div><div class="pet">하위업무가 없습니다</div><div class="pesub">위 입력창에 업무를 추가해 보세요</div></div>` :
      sorted.map(t => {
        const m = member(t.assigneeId);
        const d = isTaskDoneOn(t, todayStr());
        return `
          <div class="pj-task-row">
            <input type="checkbox" ${d?'checked':''} data-action="toggle-done" data-id="${t.id}" data-date="${todayStr()}">
            <input type="text" class="pt-title-input ${d?'done':''}" value="${esc(t.title)}" data-inline-title="${t.id}" readonly title="더블클릭하여 수정">
            ${m ? avatar(m, 24) : ''}
            <input type="date" class="pt-date-input" value="${t.date || ''}" data-inline-date="${t.id}" title="날짜 변경">
            <span class="pt-btn del" data-action="delete-task-quick" data-id="${t.id}" title="삭제">🗑</span>
          </div>
        `;
      }).join('')
    }
  `;
}

function renderPjNotes(p, notes) {
  const grouped = {};
  [...notes].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(n => {
    const d = (n.createdAt || '').slice(0, 10);
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(n);
  });
  const dates = Object.keys(grouped).sort().reverse();

  // Schedule event wiring after DOM updates
  setTimeout(() => {
    attachNoteEditorEvents(p.id);
    renderPendingImages(p.id);
  }, 0);

  return `
    <div class="pj-note-editor">
      <textarea id="pj-note-input" placeholder="진행경과, 중간 결과물, 문제점/이슈, 해결과정, 참고자료, 링크 등 여정을 기록해주세요&#10;&#10;💡 스크린샷을 Ctrl+V로 붙여넣거나 파일을 드래그해 보세요"></textarea>
      <div id="pj-note-pending" class="pj-note-pending" style="display:none"></div>
      <div class="pj-note-toolbar">
        <span class="pj-note-hint">Ctrl+Enter로 저장 · Ctrl+V로 이미지 붙여넣기</span>
        <div style="display:flex;gap:6px">
          <label class="btn btn-secondary btn-sm" style="margin:0;cursor:pointer">
            🖼 이미지
            <input type="file" accept="image/*" multiple style="display:none" onchange="window.handleNoteFileInput('${p.id}', this)">
          </label>
          <button class="btn btn-primary btn-sm" data-action="add-note" data-id="${p.id}">💾 저장</button>
        </div>
      </div>
    </div>
    ${dates.length === 0 ? `<div class="pj-empty-soft"><div class="pei">📝</div><div class="pet">아직 노트가 없습니다</div><div class="pesub">위에 진행 과정을 기록해 보세요</div></div>` :
      dates.map(d => `
        <div class="pj-note-date-head">${d}</div>
        ${grouped[d].map(n => {
          const m = member(n.authorId);
          const dt = new Date(n.createdAt);
          const timeStr = `${dt.getHours() < 12 ? '오전' : '오후'} ${String((dt.getHours()%12)||12).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
          const images = n.images || [];
          return `
            <div class="pj-note-card">
              <div class="pj-note-head">
                <div class="pj-note-author">${m ? avatar(m, 24) : ''}${esc(m?.name || '알 수 없음')}</div>
                <div class="pj-note-side"><span>${timeStr}</span>${n.authorId === session.currentUserId ? `<span class="ndel" data-action="delete-note" data-pid="${p.id}" data-id="${n.id}">삭제</span>` : ''}</div>
              </div>
              ${n.content ? `<div class="pj-note-content">${esc(n.content)}</div>` : ''}
              ${images.length ? `
                <div class="pj-note-images">
                  ${images.map((src, i) => `<img class="pj-note-img" src="${src}" alt="" onclick="window.openLightbox(this.src)">`).join('')}
                </div>
              ` : ''}
            </div>
          `;
        }).join('')}
      `).join('')
    }
  `;
}

// Expose for inline handlers
window.openLightbox = openLightbox;
window.handleNoteFileInput = function(projectId, input) {
  handleNoteImageFiles(projectId, [...input.files]);
  input.value = ''; // allow re-picking same file
};

function renderPjComments(p, comments) {
  const me_ = me();
  const sorted = [...comments].sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  const fmtCommentTime = (iso) => {
    const d = new Date(iso);
    const ampm = d.getHours() < 12 ? '오전' : '오후';
    const h = (d.getHours() % 12) || 12;
    return `${d.getMonth()+1}월 ${d.getDate()}일 ${ampm} ${String(h).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  return `
    <div class="pj-comment-form">
      ${avatar(me_, 32)}
      <div class="cf-body">
        <input type="text" id="pj-comment-input" placeholder="댓글을 입력하세요..." />
        <div class="cf-actions"><button class="btn btn-primary btn-sm" data-action="add-comment" data-id="${p.id}">댓글 작성</button></div>
      </div>
    </div>
    ${sorted.length === 0 ? `<div class="pj-empty-soft"><div class="pei">💬</div><div class="pet">아직 댓글이 없습니다</div></div>` :
      sorted.map(c => {
        const m = member(c.authorId);
        return `
          <div class="pj-comment-item">
            ${avatar(m, 32)}
            <div class="pj-comment-body">
              <div class="pj-comment-head">
                <span class="cname">${esc(m?.name || '알 수 없음')}</span>
                <span class="ctime">${fmtCommentTime(c.createdAt)}</span>

              </div>
              <div class="pj-comment-text">${esc(c.content)}</div>
            </div>
          </div>
        `;
      }).join('')
    }
  `;
}

// ====== MEETINGS ======
function renderMeetings() {
  // Clear selection if selected meeting was deleted
  if (session.selectedMeetingId && !state.meetings.find(m => m.id === session.selectedMeetingId)) {
    session.selectedMeetingId = null;
  }

  const filter = session.meetingFilter || { type: 'all', period: 'all', q: '' };
  let meetings = [...state.meetings];

  // Search filter
  if (filter.q) {
    const q = filter.q.toLowerCase();
    meetings = meetings.filter(m =>
      (m.title || '').toLowerCase().includes(q) ||
      (m.notes || '').toLowerCase().includes(q) ||
      (m.agenda || '').toLowerCase().includes(q)
    );
  }

  // Type filter
  if (filter.type === 'project') meetings = meetings.filter(m => m.projectId);
  else if (filter.type === 'general') meetings = meetings.filter(m => !m.projectId);

  // Period filter
  if (filter.period !== 'all') {
    const now_d = new Date();
    let cutoff;
    if (filter.period === 'thisMonth') cutoff = new Date(now_d.getFullYear(), now_d.getMonth(), 1);
    else if (filter.period === 'last3') { cutoff = new Date(now_d); cutoff.setMonth(cutoff.getMonth() - 3); }
    if (cutoff) meetings = meetings.filter(m => new Date(m.date) >= cutoff);
  }

  meetings.sort((a, b) => new Date(b.date) - new Date(a.date));

  // Auto-select most recent if none selected and user hasn't explicitly deselected
  if (!session.selectedMeetingId && !session.meetingListMode && meetings.length) {
    session.selectedMeetingId = meetings[0].id;
  }

  const selected = session.selectedMeetingId ? state.meetings.find(m => m.id === session.selectedMeetingId) : null;

  // Group by month
  const groups = {};
  meetings.forEach(m => {
    const d = new Date(m.date);
    const key = `${d.getFullYear()}년 ${d.getMonth()+1}월`;
    (groups[key] = groups[key] || []).push(m);
  });

  const detailModeClass = selected ? 'detail-mode' : '';

  return `
    <div class="mt-page ${detailModeClass}">
      <div class="mt-side">
        <div class="mt-side-head">
          <div class="mt-side-title">📝 회의록</div>
          <button class="btn btn-primary btn-sm" data-action="new-meeting">+ 새 회의록</button>
        </div>
        <div class="mt-filters">
          <select data-meeting-filter="type">
            <option value="all" ${filter.type==='all'?'selected':''}>전체 유형</option>
            <option value="project" ${filter.type==='project'?'selected':''}>프로젝트 회의</option>
            <option value="general" ${filter.type==='general'?'selected':''}>일반 회의</option>
          </select>
          <select data-meeting-filter="period">
            <option value="all" ${filter.period==='all'?'selected':''}>전체 기간</option>
            <option value="thisMonth" ${filter.period==='thisMonth'?'selected':''}>이번 달</option>
            <option value="last3" ${filter.period==='last3'?'selected':''}>최근 3개월</option>
          </select>
        </div>
        <div class="mt-search">
          <input type="text" placeholder="🔍 회의록 검색..." value="${esc(filter.q)}" data-meeting-search="1">
        </div>
        <div class="mt-list">
          ${meetings.length === 0 ? `<div class="mt-empty-list">${filter.q || filter.type !== 'all' || filter.period !== 'all' ? '조건에 맞는 회의록이 없어요' : '회의록이 없어요'}</div>` :
            Object.entries(groups).map(([monthKey, list]) => `
              <div class="mt-month">${monthKey}</div>
              ${list.map(m => renderMeetingListCard(m, m.id === session.selectedMeetingId)).join('')}
            `).join('')
          }
        </div>
      </div>
      <div class="mt-detail">
        ${selected ? renderMeetingDetail(selected) : `
          <div class="mt-empty-detail">
            <div class="ei">☷</div>
            <div class="eih">회의록을 선택해 주세요</div>
            <div>왼쪽 목록에서 회의록을 클릭하거나 + 새 회의록으로 만들어 보세요.</div>
          </div>
        `}
      </div>
    </div>
  `;
}

function renderMeetingListCard(m, isSelected) {
  const proj = m.projectId ? state.projects.find(p => p.id === m.projectId) : null;
  const br = proj ? brand(proj.brandId) : null;
  const dotColor = br ? br.color : '#6366f1';
  const author = member(m.createdBy);
  const openCount = (m.actions || []).filter(a => !a.done).length;
  const doneCount = (m.actions || []).filter(a => a.done).length;
  const d = new Date(m.date);
  const dayKo = ['일','월','화','수','목','금','토'][d.getDay()];
  const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const dateStr = `${d.getMonth()+1}. ${d.getDate()}. (${dayKo}) ${timeStr}`;

  return `
    <div class="mt-card ${isSelected?'selected':''}" data-action="select-meeting" data-id="${m.id}">
      <div class="mt-card-top">
        <span class="mt-dot" style="background:${dotColor}"></span>
        <span class="mt-card-title">${esc(m.title)}</span>
        <span class="mt-card-date">${dateStr}</span>
      </div>
      <div class="mt-card-bot">
        <span class="mt-label">참석:</span>
        ${memberStack(m.attendeeIds || [], 20)}
        <span>${(m.attendeeIds||[]).length}명</span>
        ${author ? `<span style="margin-left:4px">✍️ ${esc(author.name)}</span>` : ''}
      </div>
      ${(m.actions && m.actions.length) ? `<div class="mt-card-ai">액션 아이템 ${m.actions.length}개${doneCount?` (완료 ${doneCount})`:''}${openCount?` (진행 ${openCount})`:''}</div>` : ''}
    </div>
  `;
}

// ====== KPIS ======
function renderKPIs() {
  const f = session.kpiBrandFilter || 'all';
  let brandsToShow = state.brands;
  if (f !== 'all' && f !== '__none__') brandsToShow = state.brands.filter(b => b.id === f);
  if (f === '__none__') brandsToShow = [];
  const isFiltered = f !== 'all';

  const noKpiKpis = state.kpis.filter(k => !k.brandId);

  // Helper: render single KPI item with accordion expansion
  // 전체 view: collapsed by default, click row to toggle
  // 상세 view (forceOpen=true): always expanded with project-grouped tasks
  function kpiItemHtml(k, forceOpen = false) {
    const p = kpiProgress(k);
    const pct = p.pct;
    const kCls = pct >= 80 ? 'hi' : pct >= 40 ? 'mid' : 'lo';
    const kBar = pct >= 80 ? 'var(--success)' : pct >= 40 ? 'var(--primary)' : 'var(--danger)';
    // Open state: detail mode always open; 전체 mode uses transient in-memory toggle
    const isOpen = forceOpen || (window._kpiOpen && window._kpiOpen.has(k.id));

    let accHtml = '';
    if (isOpen) {
      const linkedProjects = state.projects.filter(p => p.kpiId === k.id);
      const linkedProjectIds = new Set(linkedProjects.map(p => p.id));
      // All tasks counted toward this KPI: directly linked OR belonging to a linked project
      // (only oneoff types, matching kpiProgress logic)
      const allLinkedTasks = state.tasks.filter(t =>
        t.type === 'oneoff' && (t.kpiId === k.id || (t.projectId && linkedProjectIds.has(t.projectId)))
      );
      // Orphans: directly linked but project not linked to this KPI (or no project)
      const orphanTasks = allLinkedTasks.filter(t => !t.projectId || !linkedProjectIds.has(t.projectId));

      const renderTaskRow = (t) => {
        const a = state.members.find(m => m.id === t.assigneeId);
        const isDone = isTaskDoneOn(t, todayStr());
        const statusLbl = isDone ? '완료' : (t.status === 'doing' ? '진행' : '대기');
        return `
          <div class="kpi-dash-acc-task ${isDone?'done':''}" data-action="open-task" data-id="${t.id}">
            <span class="kpi-dash-acc-task-avatar">${a ? avatar(a, 20) : ''}</span>
            <span class="kpi-dash-acc-task-title">${esc(t.title)}</span>
            <span class="kpi-dash-acc-task-status">${statusLbl}</span>
          </div>
        `;
      };

      accHtml = `
        <div class="kpi-dash-accordion">
          ${linkedProjects.length === 0 && orphanTasks.length === 0 ? `
            <div class="kpi-dash-acc-empty">연결된 프로젝트·업무 없음</div>
          ` : ''}

          ${linkedProjects.map(p => {
            const projTasks = allLinkedTasks.filter(t => t.projectId === p.id);
            const prog = projectProgress(p.id);
            return `
              <div class="kpi-dash-proj-block">
                <div class="kpi-dash-proj-head" data-action="open-project" data-id="${p.id}">
                  <span class="kpi-dash-proj-name">◇ ${esc(p.name)}</span>
                  <span class="kpi-dash-proj-prog">진행률 ${prog}%</span>
                </div>
                ${projTasks.length ? `
                  <div class="kpi-dash-proj-tasks">
                    ${projTasks.slice(0, 8).map(renderTaskRow).join('')}
                    ${projTasks.length > 8 ? `<div class="kpi-dash-acc-empty">외 ${projTasks.length-8}개 더</div>` : ''}
                  </div>
                ` : `<div class="kpi-dash-acc-empty kpi-dash-proj-empty">이 프로젝트에 연결된 업무 없음</div>`}
              </div>
            `;
          }).join('')}

          ${orphanTasks.length > 0 ? `
            <div class="kpi-dash-proj-block">
              <div class="kpi-dash-proj-head" style="cursor:default">
                <span class="kpi-dash-proj-name" style="color:var(--text-muted)">◌ 프로젝트 없는 업무</span>
                <span class="kpi-dash-proj-prog">${orphanTasks.length}개</span>
              </div>
              <div class="kpi-dash-proj-tasks">
                ${orphanTasks.slice(0, 8).map(renderTaskRow).join('')}
                ${orphanTasks.length > 8 ? `<div class="kpi-dash-acc-empty">외 ${orphanTasks.length-8}개 더</div>` : ''}
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }

    // 전체 view: entire row toggles accordion. Only ✎ opens edit modal.
    return `
      <div class="kpi-dash-kitem ${isOpen?'open':''} ${forceOpen?'force-open':''}" ${forceOpen?'':`data-action="kpi-item-toggle" data-id="${k.id}" style="cursor:pointer"`}>
        <div class="kpi-dash-kitem-row">
          ${forceOpen ? '' : `<span class="kpi-dash-kitem-arrow">${isOpen?'▼':'▶'}</span>`}
          <span class="kpi-dash-kitem-title">${esc(k.title)}${p.isAuto ? ' <span class="kpi-auto-badge">자동</span>' : ''}</span>
          <span class="kpi-dash-kitem-val"><span class="knum">${p.current}</span> / ${p.target} ${esc(p.unit)}</span>
          <button class="kpi-dash-kitem-edit" data-action="open-kpi" data-id="${k.id}" title="수정">✎</button>
          <span class="kpi-dash-kitem-pct ${kCls}">${pct}%</span>
        </div>
        <div class="kpi-dash-kitem-bar"><div style="width:${pct}%;background:${kBar}"></div></div>
        ${accHtml}
      </div>
    `;
  }

  // Helper to render one brand card
  function brandCardHtml(b, bKpis) {
    const hasKpis = bKpis.length > 0;
    const avg = hasKpis ? Math.round(bKpis.reduce((s,k) => s + kpiProgress(k).pct, 0) / bKpis.length) : 0;
    const pctCls = !hasKpis ? 'none' : avg >= 80 ? 'hi' : avg >= 40 ? 'mid' : 'lo';
    const goalText = b.goal || '';
    const initial = (b.name || '').charAt(0);
    return `
      <div class="kpi-dash-card">
        <div class="kpi-dash-top">
          <div class="kpi-dash-logo-wrap">
            <div class="kpi-dash-logo" style="background:${b.color}">${esc(initial)}</div>
            <span class="kpi-dash-tag" style="color:${b.color}">브랜드</span>
          </div>
          <div class="kpi-dash-pct ${pctCls}">${hasKpis ? avg + '%' : 'KPI 없음'}</div>
        </div>
        <div class="kpi-dash-name">${esc(b.name)}</div>
        <div class="kpi-dash-goal ${goalText?'':'empty'}" data-action="edit-brand-goal" data-id="${b.id}" title="${goalText?'클릭하면 수정':'클릭하면 작성'}">${goalText ? esc(goalText) : '목표를 입력하세요 (클릭)'}</div>
        ${isFiltered ? '' : `
          <div class="kpi-dash-btns">
            <button class="kpi-dash-btn outline" data-action="kpi-card-detail" data-id="${b.id}" style="color:${b.color};border-color:${b.color}">📊 상세 보기</button>
          </div>
        `}
        <div class="kpi-dash-kpis">
          ${hasKpis ? bKpis.map(k => kpiItemHtml(k)).join('') : '<div class="kpi-dash-empty-kpis">아직 KPI가 없어요</div>'}
          <button class="kpi-dash-add" data-action="new-kpi-for-brand" data-id="${b.id}">+ KPI 추가</button>
        </div>
      </div>
    `;
  }

  const brandCardsHtml = brandsToShow.map(b => {
    const bKpis = state.kpis.filter(k => k.brandId === b.id);
    return brandCardHtml(b, bKpis);
  }).join('');

  // No-brand section (only when viewing "all" or "__none__")
  let noBrandHtml = '';
  if ((f === 'all' || f === '__none__') && noKpiKpis.length > 0) {
    const avg = Math.round(noKpiKpis.reduce((s,k) => s + kpiProgress(k).pct, 0) / noKpiKpis.length);
    const pctCls = avg >= 80 ? 'hi' : avg >= 40 ? 'mid' : 'lo';
    noBrandHtml = `
      <div class="kpi-dash-card">
        <div class="kpi-dash-top">
          <div class="kpi-dash-logo-wrap">
            <div class="kpi-dash-logo" style="background:#9c9a92">–</div>
            <span class="kpi-dash-tag" style="color:#9c9a92">미지정</span>
          </div>
          <div class="kpi-dash-pct ${pctCls}">${avg}%</div>
        </div>
        <div class="kpi-dash-name" style="color:var(--text-muted)">브랜드 미지정</div>
        <div class="kpi-dash-goal empty">—</div>
        ${isFiltered ? '' : `
          <div class="kpi-dash-btns">
            <button class="kpi-dash-btn outline" data-action="kpi-filter" data-brand="__none__" style="color:#9c9a92;border-color:#9c9a92">📊 상세 보기</button>
          </div>
        `}
        <div class="kpi-dash-kpis">
          ${noKpiKpis.map(k => kpiItemHtml(k)).join('')}
        </div>
      </div>
    `;
  }

  const hasAnything = brandsToShow.length > 0 || noBrandHtml;

  // === FILTERED (DETAIL) MODE: single brand selected ===
  // Show brand summary card at top + KPI cards in 3-column grid (always expanded)
  if (isFiltered && brandsToShow.length === 1 && brandsToShow[0].id !== '__none__') {
    const b = brandsToShow[0];
    const bKpis = state.kpis.filter(k => k.brandId === b.id);
    const hasKpis = bKpis.length > 0;

function getMyGoalEntry(userId) {
  if (!state.goals[userId]) state.goals[userId] = { weeklyReports: [] };
  if (!state.goals[userId].weeklyReports) state.goals[userId].weeklyReports = [];
  return state.goals[userId];
}

function currentWeekInfo() {
  // Returns { key: "2026-W16", label: "04/14-04/20", mondayStr, sundayStr, isFriday }
  const now_d = new Date();
  const dow = now_d.getDay(); // 0=Sun, 1=Mon...
  const diffToMon = (dow + 6) % 7;
  const monday = new Date(now_d); monday.setDate(now_d.getDate() - diffToMon); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  // ISO week key approximation (yyyy-Wnn)
  const yearStart = new Date(monday.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((monday - yearStart) / 86400000 + yearStart.getDay() + 1) / 7);
  const key = `${monday.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
  const fmt = (d) => `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  return {
    key, label: `${fmt(monday)}–${fmt(sunday)}`,
    mondayStr: `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`,
    isFriday: dow === 5,
    year: monday.getFullYear(),
  };
}
