async function actionExportGoalsImage() {
  const pageEl = document.querySelector('.gl-page');
  const btn = document.getElementById('gl-export-btn');
  if (!pageEl) return;
  if (typeof html2canvas === 'undefined') {
    alert('이미지 라이브러리를 아직 불러오지 못했어요. 인터넷 연결을 확인하고 잠시 후 다시 시도해 주세요.');
    return;
  }

  // Temporarily expand all projects for complete capture
  const prevExpanded = JSON.parse(JSON.stringify(session.goalsExpandedProjects || {}));
  session.goalsExpandedProjects = session.goalsExpandedProjects || {};
  state.projects.forEach(p => { session.goalsExpandedProjects[p.id] = true; });

  if (btn) { btn.disabled = true; btn.textContent = '📸 생성 중...'; }

  try {
    // Re-render to show expanded state
    render();
    // Wait a frame for DOM to update
    await new Promise(r => setTimeout(r, 50));

    const freshEl = document.querySelector('.gl-page');
    const canvas = await html2canvas(freshEl, {
      backgroundColor: '#f9fafb',
      scale: 2,
      useCORS: true,
      logging: false,
      ignoreElements: (el) => el.id === 'gl-export-btn',
    });

    canvas.toBlob((blob) => {
      const u = me();
      const date = todayStr();
      const filename = `${u.name}_연간목표_${date}.png`;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  } catch (e) {
    console.error('Export failed', e);
    alert('이미지 생성에 실패했어요. 다시 시도해 주세요.\n' + e.message);
  } finally {
    // Restore expansion state
    session.goalsExpandedProjects = prevExpanded;
    render();
  }
}

          <div class="form-row"><label>목표 내용</label><textarea name="content" style="min-height:160px" placeholder="이 연도의 목표와 방향성을 자유롭게 작성하세요">${esc(entry.content || '')}</textarea></div>
        </form>
      </div>
      <div class="modal-footer">
        <div class="left">
          <button class="btn btn-danger btn-sm" data-action="tg-delete-year" data-id="${cardId}" data-year="${year}">이 연도 내역 삭제</button>
        </div>
        <div class="right">
          <button class="btn btn-secondary" data-action="close-modal">취소</button>
          <button class="btn btn-primary" data-action="tg-save" data-id="${cardId}">저장</button>
        </div>
      </div>
    </div>
  `;
  session.modal = { html };
  renderModal();
}

async function actionTgSave(cardId) {
  const c = state.teamGoals.cards.find(x => x.id === cardId);
  if (!c) return;
  const f = document.getElementById('tg-form');
  const title = f.title.value.trim();
  const year = f.year.value.trim();
  const content = f.content.value;
  if (!title) { alert('카드 제목을 입력해 주세요'); return; }
  c.title = title;
  if (!c.byYear) c.byYear = {};
  c.byYear[year] = { content, updatedAt: now() };
  session.tgViewYear = session.tgViewYear || {};
  session.tgViewYear[cardId] = year;
  logAct(`연간 목표 저장: ${title} (${year})`);
  closeModal();
  await saveState();
  render();
}

async function actionTgDeleteYear(cardId, year) {
  showConfirm({
    title: `${year}년 내역을 삭제할까요?`,
    message: '이 작업은 되돌릴 수 없어요.',
    confirmText: '삭제',
    danger: true,
    onConfirm: async () => {
      const c = state.teamGoals.cards.find(x => x.id === cardId);
      if (!c || !c.byYear) return;
      delete c.byYear[year];
      // Reset view year
      const remaining = Object.keys(c.byYear).sort().reverse();
      session.tgViewYear = session.tgViewYear || {};
      session.tgViewYear[cardId] = remaining[0] || String(new Date().getFullYear());
      closeModal();
      await saveState();
      render();
    },
  });
}

// ====== BACKUP / RESTORE ======
const BACKUP_VERSION = 1;
const LAST_BACKUP_KEY = 'bm-last-backup';

function renderBackup() {
  // Compute counts for preview
  const counts = {
    tasks: state.tasks.length,
    projects: state.projects.length,
    kpis: state.kpis.length,
    meetings: state.meetings.length,
    requests: state.requests.length,
    members: state.members.length,
    brands: state.brands.length,
    templates: (state.taskTemplates || []).length,
    trash: (state.trash || []).length,
  };
  const totalItems = Object.values(counts).reduce((a, b) => a + b, 0);

  // Last backup time (from localStorage, per-browser)
  let lastBackup = null;
  try {
    const raw = localStorage.getItem(LAST_BACKUP_KEY);
    if (raw) lastBackup = JSON.parse(raw);
  } catch {}

  function formatDate(iso) {
    if (!iso) return '없음';
    const d = new Date(iso);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return `${y}.${m}.${day} ${h}:${min}`;
  }

  // Days since last backup → recommendation severity
  let recommendCls = '';
  let recommendText = '';
  if (!lastBackup) {
    recommendCls = 'warn';
    recommendText = '아직 백업한 적이 없어요. 지금 한 번 받아두시는 걸 추천드려요.';
  } else {
    const days = Math.floor((Date.now() - new Date(lastBackup.at).getTime()) / (1000*60*60*24));
    if (days >= 14) {
      recommendCls = 'urgent';
      recommendText = `마지막 백업 후 ${days}일이 지났어요. 새로 받아두세요.`;
    } else if (days >= 7) {
      recommendCls = 'warn';
      recommendText = `마지막 백업 후 ${days}일 됐어요. 곧 새로 받아두면 좋아요.`;
    } else {
      recommendCls = 'ok';
      recommendText = `최근에 백업하셨어요 (${days === 0 ? '오늘' : days + '일 전'}). 안전!`;
    }
  }

  return `
    <div class="backup-page">
      <div class="backup-status ${recommendCls}">
        <div class="backup-status-icon">${recommendCls === 'ok' ? '✓' : recommendCls === 'warn' ? '⚠' : '!'}</div>
        <div class="backup-status-main">
          <div class="backup-status-title">${recommendText}</div>
          <div class="backup-status-sub">마지막 백업: ${formatDate(lastBackup?.at)}${lastBackup?.by ? ` · ${esc(lastBackup.by)}` : ''}</div>
        </div>
      </div>

      <div class="backup-grid">
        <!-- Download -->
        <div class="backup-card">
          <div class="backup-card-header">
            <div class="backup-card-icon" style="background:var(--primary-soft);color:var(--primary)">📥</div>
            <div>
              <div class="backup-card-title">백업 다운로드</div>
              <div class="backup-card-desc">전체 데이터를 한 파일로 저장해요</div>
            </div>
          </div>

          <div class="backup-counts">
            <div class="backup-count"><span class="bc-num">${counts.tasks}</span><span class="bc-lbl">업무</span></div>
            <div class="backup-count"><span class="bc-num">${counts.projects}</span><span class="bc-lbl">프로젝트</span></div>
            <div class="backup-count"><span class="bc-num">${counts.kpis}</span><span class="bc-lbl">KPI</span></div>
            <div class="backup-count"><span class="bc-num">${counts.meetings}</span><span class="bc-lbl">회의록</span></div>
            <div class="backup-count"><span class="bc-num">${counts.requests}</span><span class="bc-lbl">요청</span></div>
            <div class="backup-count"><span class="bc-num">${counts.templates}</span><span class="bc-lbl">템플릿</span></div>
            <div class="backup-count"><span class="bc-num">${counts.brands}</span><span class="bc-lbl">브랜드</span></div>
            <div class="backup-count"><span class="bc-num">${counts.members}</span><span class="bc-lbl">팀원</span></div>
          </div>

          <button class="btn btn-primary backup-action-btn" data-action="backup-download">
            📥 백업 파일 다운로드 (${totalItems}개 항목)
          </button>
          <div class="backup-card-hint">
            💡 다운로드한 파일은 안전한 곳에 보관하세요.<br>
            (구글 드라이브, 이메일, USB 등)
          </div>
        </div>

        <!-- Restore -->
        <div class="backup-card">
          <div class="backup-card-header">
            <div class="backup-card-icon" style="background:var(--warning-soft);color:var(--warning)">📤</div>
            <div>
              <div class="backup-card-title">백업에서 복원</div>
              <div class="backup-card-desc">이전에 받은 백업 파일로 되돌려요</div>
            </div>
          </div>

          <div class="backup-dropzone" id="backup-dropzone">
            <div class="bd-icon">📁</div>
            <div class="bd-title">파일을 여기로 드래그</div>
            <div class="bd-or">또는</div>
            <label class="btn btn-secondary" style="margin:0;cursor:pointer">
              파일 선택
              <input type="file" accept=".json" style="display:none" id="backup-file-input" onchange="window.handleBackupFileSelect(this)">
            </label>
          </div>

          <div class="backup-card-hint" style="color:var(--danger)">
            ⚠️ 복원하면 <strong>현재 모든 데이터가 백업 시점으로 덮어써져요</strong>.<br>
            먼저 현재 상태를 백업해두는 걸 권장해요.
          </div>
        </div>
      </div>

      <div class="backup-tips">
        <div class="backup-tips-title">💡 백업 활용 팁</div>
        <ul>
          <li><strong>주 1회</strong> 정도 정기적으로 백업해두면 안전해요</li>
          <li>큰 변경 작업 전(브랜드 정리, 일괄 삭제 등)에는 꼭 백업 먼저!</li>
          <li>백업 파일은 <strong>JSON 형식</strong>으로 텍스트 에디터로도 열어볼 수 있어요</li>
          <li>다른 팀원도 이 페이지에서 백업/복원 가능해요</li>
        </ul>
      </div>
    </div>
  `;
}

// Build backup object from current state
function buildBackup() {
  return {
    version: BACKUP_VERSION,
    exportedAt: now(),
    exportedBy: me()?.name || 'unknown',
    teamName: state.setup?.teamName || '',
    state: JSON.parse(JSON.stringify(state)),
  };
}

async function actionBackupDownload() {
  const backup = buildBackup();
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const d = new Date();
  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  const teamName = (state.setup?.teamName || '워크스페이스').replace(/[^\w가-힣]/g, '_');
  const filename = `${teamName}_백업_${dateStr}.json`;

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Record last backup time (per-browser)
  try {
    localStorage.setItem(LAST_BACKUP_KEY, JSON.stringify({
      at: now(),
      by: me()?.name,
      filename,
    }));
  } catch {}

  logAct('백업 파일 다운로드');
  render();
}

window.handleBackupFileSelect = function(input) {
  const file = input.files?.[0];
  input.value = ''; // Allow re-selecting same file
  if (!file) return;
  handleBackupFile(file);
};

function handleBackupFile(file) {
  if (!file.name.endsWith('.json')) {
    alert('JSON 파일만 복원할 수 있어요.');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || !data.state) {
        alert('올바른 백업 파일이 아니에요.');
        return;
      }
      previewBackupRestore(data, file.name);
    } catch (err) {
      alert('파일을 읽지 못했어요. 손상된 파일일 수 있어요.');
      console.warn('Backup parse error:', err);
    }
  };
  reader.readAsText(file);
}

async function actionBackupRestore(backup) {
  try {
    // Replace state entirely
    state = backup.state;
    // Make sure all required fields exist (in case old backup is missing new fields)
    if (!Array.isArray(state.tasks)) state.tasks = [];
    if (!Array.isArray(state.projects)) state.projects = [];
    if (!Array.isArray(state.kpis)) state.kpis = [];
    if (!Array.isArray(state.meetings)) state.meetings = [];
    if (!Array.isArray(state.requests)) state.requests = [];
    if (!Array.isArray(state.members)) state.members = [];
    if (!Array.isArray(state.brands)) state.brands = [];
    if (!Array.isArray(state.taskTemplates)) state.taskTemplates = [];
    if (!Array.isArray(state.trash)) state.trash = [];
    if (!Array.isArray(state.log)) state.log = [];
    if (!state.setup) state.setup = { completed: true, teamName: '' };
    if (!state.goals) state.goals = {};
    if (!state.hiddenProjectsByUser || typeof state.hiddenProjectsByUser !== 'object') state.hiddenProjectsByUser = {};

    logAct(`백업에서 복원: ${backup.exportedAt ? new Date(backup.exportedAt).toLocaleDateString('ko-KR') : '알 수 없음'}`);
    await saveState();
    alert('✅ 복원이 완료됐어요!');
    render();
  } catch (e) {
    console.error('Restore failed', e);
    alert('복원 중 오류가 발생했어요. 콘솔을 확인해주세요.');
  }
}

// Wire up drag&drop on backup dropzone after page renders
function attachBackupDropzone() {
  const dz = document.getElementById('backup-dropzone');
  if (!dz) return;
  dz.addEventListener('dragover', (e) => {
    e.preventDefault();
    dz.classList.add('dragover');
  });
  dz.addEventListener('dragleave', (e) => {
    if (e.target === dz) dz.classList.remove('dragover');
  });
  dz.addEventListener('drop', (e) => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const file = e.dataTransfer?.files?.[0];
    if (file) handleBackupFile(file);
  });
}

// ====== TRASH ======
function renderTrash() {
  const items = state.trash || [];
  const filter = session.trashFilter || 'all';
  const filtered = filter === 'all' ? items : items.filter(i => i.kind === filter);
  const counts = {
    all: items.length,
    task: items.filter(i => i.kind === 'task').length,
    project: items.filter(i => i.kind === 'project').length,
    note: items.filter(i => i.kind === 'note').length,
  };

  function itemRow(item) {
    const days = trashDaysLeft(item);
    const daysCls = days <= 1 ? 'urgent' : days <= 3 ? 'soon' : '';
    const icons = { task: '✓', project: '◇', note: '📝' };
    let title = '';
    let subtitle = '';
    if (item.kind === 'task') {
      title = item.data.title || '(제목 없음)';
      subtitle = item.data.type === 'oneoff' ? '단일 업무' : item.data.type === 'daily' ? '일일 루틴' : item.data.type === 'weekly' ? '주간 루틴' : '장기 업무';
    } else if (item.kind === 'project') {
      title = item.data.name || '(이름 없음)';
      const taskCount = (item.extra?.taskIds || []).length;
      subtitle = taskCount > 0 ? `연결된 업무 ${taskCount}개 (복원 시 다시 연결)` : '연결된 업무 없음';
    } else if (item.kind === 'note') {
      const c = item.data.content || '';
      title = c.slice(0, 60) + (c.length > 60 ? '...' : '') || `[이미지 ${(item.data.images||[]).length}장]`;
      subtitle = `프로젝트: ${item.extra?.projectName || '(삭제된 프로젝트)'}`;
    }
    const deletedBy = state.members.find(m => m.id === item.deletedBy);
    const dt = new Date(item.deletedAt);
    const dateStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return `
      <div class="trash-item">
        <div class="trash-item-icon">${icons[item.kind] || '?'}</div>
        <div class="trash-item-main">
          <div class="trash-item-title">${esc(title)}</div>
          <div class="trash-item-meta">
            <span class="trash-item-kind">${TRASH_KIND_LABEL[item.kind] || item.kind}</span>
            <span>${esc(subtitle)}</span>
            <span>· ${dateStr}${deletedBy ? ` · ${esc(deletedBy.name)}` : ''}</span>
            <span class="trash-item-days ${daysCls}">· ${days}일 남음</span>
          </div>
        </div>
        <div class="trash-item-actions">
          <button class="btn btn-secondary btn-sm" data-action="trash-restore" data-id="${item.id}">↺ 복원</button>
          <button class="btn btn-danger btn-sm" data-action="trash-purge" data-id="${item.id}">영구 삭제</button>
        </div>
      </div>
    `;
  }

  return `
    <div class="trash-page">
      <div class="trash-head">
        <div class="trash-info">🗑 휴지통의 항목은 <strong>7일 후 자동으로 영구 삭제</strong>됩니다.</div>
        ${items.length > 0 ? `<button class="btn btn-danger btn-sm" data-action="trash-empty-all">전체 비우기</button>` : ''}
      </div>
      <div class="trash-filter">
        <span class="trash-filter-chip ${filter==='all'?'active':''}" data-action="trash-filter" data-id="all">전체 (${counts.all})</span>
        <span class="trash-filter-chip ${filter==='task'?'active':''}" data-action="trash-filter" data-id="task">✓ 업무 (${counts.task})</span>
        <span class="trash-filter-chip ${filter==='project'?'active':''}" data-action="trash-filter" data-id="project">◇ 프로젝트 (${counts.project})</span>
        <span class="trash-filter-chip ${filter==='note'?'active':''}" data-action="trash-filter" data-id="note">📝 노트 (${counts.note})</span>
      </div>
      ${filtered.length === 0 ? `
        <div class="trash-empty">
          <div class="ei">🗑</div>
          <div class="eih">${items.length === 0 ? '휴지통이 비어 있어요' : '해당 항목이 없어요'}</div>
          <div>삭제한 ${TRASH_KIND_LABEL[filter] || '항목'}이 여기 표시됩니다.</div>
        </div>
      ` : `
        <div class="trash-list">${filtered.map(itemRow).join('')}</div>
      `}
    </div>
  `;
}

async function actionTrashRestore(itemId) {
  const item = state.trash.find(i => i.id === itemId);
  if (!item) return;
  if (item.kind === 'task') {
    state.tasks.push(item.data);
  } else if (item.kind === 'project') {
    state.projects.push(item.data);
    // Re-link tasks if they still exist and aren't linked elsewhere
    (item.extra?.taskIds || []).forEach(tid => {
      const t = state.tasks.find(x => x.id === tid);
      if (t && !t.projectId) t.projectId = item.data.id;
    });
  } else if (item.kind === 'note') {
    const p = state.projects.find(x => x.id === item.extra?.projectId);
    if (!p) {
      alert('이 노트가 속했던 프로젝트가 없어요. 노트는 복원할 수 없습니다.');
      return;
    }
    p.notes = p.notes || [];
    p.notes.push(item.data);
  }
  state.trash = state.trash.filter(i => i.id !== itemId);
  logAct(`복원: ${TRASH_KIND_LABEL[item.kind]}`);
  await saveState(); render();
}

async function actionTrashPurge(itemId) {
  const item = state.trash.find(i => i.id === itemId);
  if (!item) return;
  showConfirm({
    title: '영구 삭제할까요?',
    message: '이 작업은 되돌릴 수 없어요.',
    confirmText: '영구 삭제',

    onConfirm: async () => {
      state.trash = state.trash.filter(i => i.id !== itemId);
      await saveState(); render();

  });
}

async function actionTrashEmptyAll() {

// ====== MODAL ======
function renderModal() {
  if (!session.modal) return;
  const existing = document.querySelector('.modal-backdrop');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'modal-backdrop';
  el.innerHTML = session.modal.html;
  el.addEventListener('click', (e) => { if (e.target === el) closeModal(); });
  // Prevent ANY <form> inside modal from submitting (would cause unintended navigation)
  el.addEventListener('submit', (e) => e.preventDefault());
  document.body.appendChild(el);
}
function closeModal() { session.modal = null; const e = document.querySelector('.modal-backdrop'); if (e) e.remove(); }

async function actionSaveTask(id) {
  const f = document.getElementById('task-form');
  const type = f.type.value;
  const existing = id ? state.tasks.find(t => t.id === id) : null;
  const title = f.title.value.trim();
  if (!title) { alert('제목을 입력해 주세요'); return; }
  const data = {
    title, type,
    desc: f.desc.value,
    assigneeId: existing?.assigneeId || session.currentUserId,
    status: existing?.status || 'todo',
    priority: existing?.priority || 'mid',
    date: type === 'oneoff' ? (f.date?.value || todayStr()) : null,
    projectId: f.projectId.value || null,
    kpiId: f.kpiId.value || null,
    brandId: f.brandId.value || null,
    updatedAt: now(),
  };
  if (id) {
    data.completions = existing.completions || {};
    Object.assign(existing, data);
    logAct(`업무 수정: ${data.title}`);
  } else {
    state.tasks.push({ id: uid(), ...data, completions: {}, createdAt: now(), createdBy: session.currentUserId });
    logAct(`새 업무: ${data.title}`);
  }
  closeModal(); await saveState(); render();
}
async function actionDeleteTask(id) {
  const t = state.tasks.find(x => x.id === id);

}

    name: f.name.value.trim(), desc: f.desc.value,

  };
  if (!data.name) { alert('프로젝트명을 입력해 주세요'); return; }

  if (id) {

async function actionDeleteProject(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  const linkedTasks = state.tasks.filter(t => t.projectId === id);
  showConfirm({
    title: '프로젝트를 휴지통으로 옮길까요?',
    message: `"${esc(p.name)}"<br>${linkedTasks.length > 0 ? `연결된 업무 ${linkedTasks.length}개의 프로젝트 정보가 해제됩니다.<br>` : ''}휴지통에서 7일간 복원할 수 있어요.`,
    confirmText: '휴지통으로',
    danger: true,
    onConfirm: async () => {
      // Save links before unlinking so restore can rewire
      const taskLinks = linkedTasks.map(t => t.id);
      moveToTrash('project', p, { taskIds: taskLinks });
      state.projects = state.projects.filter(x => x.id !== id);
      state.tasks.forEach(t => { if (t.projectId === id) t.projectId = null; });
      // Clean up hidden references for this project across all users
      Object.keys(state.hiddenProjectsByUser || {}).forEach(uid => {
        state.hiddenProjectsByUser[uid] = (state.hiddenProjectsByUser[uid] || []).filter(pid => pid !== id);
      });
      logAct(`프로젝트 삭제: ${p.name}`);
      closeModal(); await saveState(); render();
    },
  });
}

// ====== TASK TEMPLATES ======
function renderTemplates() {
  const filter = session.tplBrandFilter || 'all';
  const counts = { all: state.taskTemplates.length, __none__: 0, __shared__: 0 };
  state.brands.forEach(b => { counts[b.id] = 0; });
  state.taskTemplates.forEach(t => {
    const bids = t.brandIds || [];
    if (bids.length === 0) counts.__none__++;
    else if (bids.length >= 2) counts.__shared__++;
    bids.forEach(bid => { if (counts[bid] !== undefined) counts[bid]++; });
  });

  // Apply filter
  let tpls = state.taskTemplates;
  if (filter === '__none__') tpls = tpls.filter(t => !t.brandIds || t.brandIds.length === 0);
  else if (filter === '__shared__') tpls = tpls.filter(t => (t.brandIds || []).length >= 2);
  else if (filter !== 'all') tpls = tpls.filter(t => (t.brandIds || []).includes(filter));

  // Build groups. Each template appears in exactly ONE group:
  // - 공용 (shared) if 2+ brands
  // - specific brand if exactly 1 brand
  // - 브랜드 미지정 if 0 brands
  const byGroup = { __shared__: [], __none__: [] };
  state.brands.forEach(b => { byGroup[b.id] = []; });
  tpls.forEach(t => {
    const bids = t.brandIds || [];
    if (bids.length === 0) byGroup.__none__.push(t);
    else if (bids.length >= 2) byGroup.__shared__.push(t);
    else byGroup[bids[0]]?.push(t);
  });

  const groups = [];
  if (byGroup.__shared__.length) groups.push({ key: '__shared__', label: '공용 템플릿', color: '#6366f1', icon: '🔗', tpls: byGroup.__shared__ });
  state.brands.forEach(b => { if (byGroup[b.id]?.length) groups.push({ key: b.id, brand: b, tpls: byGroup[b.id] }); });
  if (byGroup.__none__.length) groups.push({ key: '__none__', label: '브랜드 미지정', color: '#9c9a92', tpls: byGroup.__none__ });

  return `
    <div class="tpl-page">
      <div class="tpl-filter-bar">
        <span class="tpl-filter-chip ${filter==='all'?'active':''}" data-action="tpl-filter" data-id="all">전체 (${counts.all})</span>
        ${counts.__shared__ > 0 ? `<span class="tpl-filter-chip ${filter==='__shared__'?'active':''}" data-action="tpl-filter" data-id="__shared__">🔗 공용 (${counts.__shared__})</span>` : ''}
        ${state.brands.map(b => `
          <span class="tpl-filter-chip ${filter===b.id?'active':''}" data-action="tpl-filter" data-id="${b.id}" style="${filter===b.id?`background:${b.color};border-color:${b.color}`:''}">${esc(b.name)} (${counts[b.id] || 0})</span>
        `).join('')}
        ${counts.__none__ > 0 ? `<span class="tpl-filter-chip ${filter==='__none__'?'active':''}" data-action="tpl-filter" data-id="__none__">브랜드 미지정 (${counts.__none__})</span>` : ''}
      </div>

      ${groups.length === 0 ? `
        <div class="tpl-empty">
          <div class="ei">📋</div>
          <div class="eih">${filter === 'all' ? '아직 업무 템플릿이 없어요' : '해당 조건의 템플릿이 없어요'}</div>
          <div>자주 반복되는 업무 묶음을 템플릿으로 만들어 두면,<br>새 프로젝트 시작할 때 원클릭으로 하위업무가 자동 생성돼요.</div>
          <button class="btn btn-primary" style="margin-top:16px" data-action="new-template">+ 새 템플릿 만들기</button>
        </div>
      ` : groups.map(g => `
        <div class="tpl-group">
          <div class="tpl-group-head">
            <span class="tpl-group-dot" style="background:${g.brand?.color || g.color || '#9c9a92'}"></span>
            <span>${g.brand ? esc(g.brand.name) : esc(g.label)}</span>
            <span class="tpl-group-count">${g.tpls.length}개 템플릿</span>
          </div>
          <div class="tpl-grid">

function renderTplTaskLines() {

  return tasks.map((title, i) => `
    <div class="tpl-task-line">
      <span class="num">${i+1}.</span>
      <input type="text" value="${esc(title)}" data-tpl-line="${i}" placeholder="업무 제목">
      <button type="button" data-action="tpl-remove-line" data-idx="${i}" title="삭제">✕</button>

function syncTplLines() {
  const inputs = document.querySelectorAll('[data-tpl-line]');
  inputs.forEach(el => {

async function actionTplSave(id) {
  const f = document.getElementById('tpl-form');
  const name = f.name.value.trim();
  if (!name) { alert('템플릿 이름을 입력해 주세요'); return; }
  syncTplLines();
  const tasks = (session.tplEditBuffer.tasks || []).map(t => t.trim()).filter(Boolean);
  const brandIds = [...f.querySelectorAll('input[name="tplBrandIds"]:checked')].map(x => x.value);
  const data = { name, brandIds, tasks };
  if (id) {
    const existing = state.taskTemplates.find(t => t.id === id);
    Object.assign(existing, data, { updatedAt: now() });
    // Clean up legacy field
    delete existing.brandId;
    logAct(`템플릿 수정: ${name}`);

    state.taskTemplates.push({ id: uid(), ...data, createdAt: now(), createdBy: session.currentUserId });

  }
  delete session.tplEditBuffer;
  closeModal(); await saveState(); render();
}

// Template picker inside new project modal
function renderProjectTemplatePicker(currentBrandId) {
  const all = state.taskTemplates;
  if (all.length === 0) {
    return `
      <div class="tpl-picker">
        <div class="tpl-picker-head">
          <div class="tpl-picker-title">📋 업무 템플릿</div>
          <div class="tpl-picker-hint">선택하면 업무가 자동 생성됩니다</div>
        </div>
        <div class="tpl-picker-empty">아직 등록된 템플릿이 없어요. 사이드바의 "업무 템플릿"에서 먼저 만들어 보세요.</div>
      </div>
    `;
  }

  // Filter by selected brand: show matching + 공용 (no brands)
  let filtered;
  if (currentBrandId) {
    filtered = all.filter(t => {
      const bids = t.brandIds || [];
      return bids.length === 0 || bids.includes(currentBrandId);
    });
  } else {
    filtered = all;
  }

  const selectedId = session.projectSelectedTpl || null;
  const selectedTpl = selectedId ? all.find(t => t.id === selectedId) : null;
  const isSelectedVisible = selectedTpl && filtered.find(t => t.id === selectedId);

  return `
    <div class="tpl-picker">
      <div class="tpl-picker-head">
        <div class="tpl-picker-title">📋 업무 템플릿 <span style="font-weight:400;color:var(--text-muted);font-size:11px">(선택하면 업무가 자동 생성됩니다)</span></div>
        ${selectedTpl ? '<button type="button" class="btn btn-ghost btn-sm" data-action="tpl-pick" data-id="">선택 해제</button>' : ''}
      </div>
      ${filtered.length === 0 ? `
        <div class="tpl-picker-empty">
          이 브랜드에 연결된 템플릿이 없어요.<br>
          <button type="button" class="btn btn-ghost btn-sm" style="margin-top:6px" data-action="nav" data-view="templates">템플릿 페이지에서 추가 →</button>
        </div>
      ` : `
        <div class="tpl-picker-grid">
          ${filtered.map(t => {
            const bids = t.brandIds || [];
            const brandsSummary = bids.length === 0 ? '공용' : bids.length >= 2 ? `${bids.length}개 브랜드` : (brand(bids[0])?.name || '');
            return `
              <div class="tpl-pick ${selectedId===t.id?'selected':''}" data-action="tpl-pick" data-id="${t.id}">
                <div class="tpl-pick-title">${esc(t.name)}</div>
                <div class="tpl-pick-count">${(t.tasks||[]).length}개 업무 · ${esc(brandsSummary)}</div>
              </div>
            `;
          }).join('')}
        </div>
      `}
      ${selectedTpl && !isSelectedVisible ? `
        <div style="font-size:11.5px;color:var(--warning);margin-top:8px;padding:6px 10px;background:#fffbeb;border-radius:6px;border:1px solid #fde68a">
          ⚠ 선택된 템플릿 "${esc(selectedTpl.name)}"이(가) 현재 브랜드와 맞지 않아요. 계속 진행하려면 저장 시 그대로 적용됩니다.
        </div>
      ` : ''}
    </div>
  `;
}

// Combined handler for brand change in project modal:
// 1) Refresh KPI dropdown to show only KPIs of selected brand
// 2) Refresh template picker (if in new-project mode)
window.handleProjectBrandChange = function(selectEl) {
  const brandId = selectEl.value;
  // 1. Refresh KPI dropdown
  const kpiSelect = document.getElementById('project-kpi-select');
  if (kpiSelect && window._buildProjectKpiOptions) {
    // Preserve selection if KPI is still valid for this brand
    const currentValue = kpiSelect.value;
    const validKpiIds = new Set(
      brandId
        ? state.kpis.filter(k => k.brandId === brandId).map(k => k.id)
        : state.kpis.filter(k => !k.brandId).map(k => k.id)
    );
    const keepValue = validKpiIds.has(currentValue) ? currentValue : '';
    kpiSelect.innerHTML = window._buildProjectKpiOptions(brandId, keepValue);
  }
  // 2. Refresh template picker (only present in new-project mode)
  window.updateProjectTemplatePicker(brandId);
};

async function actionToggleDone(taskId, dateStr) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  if (t.type === 'daily') {
    t.completions = t.completions || {};
    if (t.completions[dateStr]) delete t.completions[dateStr];
    else t.completions[dateStr] = true;
  } else if (t.type === 'weekly') {
    t.completions = t.completions || {};
    const wk = weekKey(dateStr);
    if (t.completions[wk]) delete t.completions[wk];
    else t.completions[wk] = true;
  } else {
    t.status = t.status === 'done' ? 'todo' : 'done';
  }
  t.updatedAt = now();
  await saveState(); render();
}

async function actionCyclePriority(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const cycle = ['low', 'mid', 'high'];
  const idx = cycle.indexOf(t.priority || 'low');
  t.priority = cycle[(idx + 1) % cycle.length];
  t.updatedAt = now();
  await saveState(); render();
}

async function actionSelectProject(id) {
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  // If we're already on projects page, just select within the current filter (sidebar click)
  // Only change filter when navigating in from elsewhere (KPI page, dashboard, etc.)
  const navigatingIn = session.view !== 'projects';
  if (navigatingIn) {
    const meId = session.currentUserId;
    const isMine = state.tasks.some(t => t.projectId === id && t.assigneeId === meId);
    if (proj.status === 'done') session.projectBrandFilter = 'done';
    else if (proj.status === 'paused') session.projectBrandFilter = 'paused';
    else if (isMine) session.projectBrandFilter = 'mine';
    else if (proj.brandId) session.projectBrandFilter = proj.brandId;
    else session.projectBrandFilter = 'all';
    // If hidden in 'mine' view, temporarily reveal
    if (session.projectBrandFilter === 'mine') {
      const hidden = state.hiddenProjectsByUser?.[meId] || [];
      if (hidden.includes(id)) session.showHiddenInMine = true;
    }
  }
  session.view = 'projects';
  session.selectedProjectId = id;
  session.projectTab = 'tasks';
  closeModal();
  render();
}

  const el = document.getElementById('pj-note-input');
  const content = (el?.value || '').trim();
  const images = pendingNoteImages[projectId] || [];
  if (!content && images.length === 0) { alert('내용을 입력하거나 이미지를 추가해 주세요'); return; }
  const p = state.projects.find(x => x.id === projectId);
  p.notes = p.notes || [];
  p.notes.push({
    id: uid(),
    content,
    images: images.slice(),
    authorId: session.currentUserId,
    createdAt: now(),
  });
  pendingNoteImages[projectId] = [];
  logAct(`프로젝트 노트 작성: ${p.name}`);
  await saveState(); render();
}
async function actionDeleteNote(projectId, noteId) {
  const p = state.projects.find(x => x.id === projectId);
  if (!p) return;
  const note = (p.notes || []).find(n => n.id === noteId);
  if (!note) return;
  const previewText = (note.content || '').slice(0, 60) || (note.images?.length ? `[이미지 ${note.images.length}장]` : '');
  showConfirm({
    title: '노트를 휴지통으로 옮길까요?',
    message: `${esc(previewText)}${(note.content||'').length > 60 ? '...' : ''}<br>휴지통에서 7일간 복원할 수 있어요.`,
    confirmText: '휴지통으로',
    danger: true,
    onConfirm: async () => {
      moveToTrash('note', note, { projectId, projectName: p.name });
      p.notes = (p.notes || []).filter(n => n.id !== noteId);
      logAct(`노트 삭제: ${p.name}`);
      await saveState(); render();
    },
  });
}
async function actionAddComment(projectId) {
  const el = document.getElementById('pj-comment-input');
  const content = (el?.value || '').trim();
  if (!content) return;
  const p = state.projects.find(x => x.id === projectId);
  p.comments = p.comments || [];
  p.comments.push({ id: uid(), content, authorId: session.currentUserId, createdAt: now() });
  await saveState(); render();
}
async function actionDeleteComment(projectId, commentId) {
  showConfirm({
    title: '댓글을 삭제할까요?',
    message: '이 작업은 되돌릴 수 없어요.',
    confirmText: '삭제',
    danger: true,
    onConfirm: async () => {
      const p = state.projects.find(x => x.id === projectId);
      p.comments = (p.comments || []).filter(c => c.id !== commentId);
      await saveState(); render();
    },
  });
}
async function actionQuickAddMeeting(projectId, title) {
  if (!title.trim()) return;
  state.meetings.push({
    id: uid(), title: title.trim(), date: now(),
    attendeeIds: [session.currentUserId],
    agenda: '', notes: '', actions: [],
    projectId,
    createdAt: now(), createdBy: session.currentUserId,
  });
  logAct(`회의록 추가: ${title}`);
  await saveState(); render();
}

async function actionDownloadWeekly() {
  const base = session.selectedDate || todayStr();
  const today = new Date(base);
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const toStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const mondayStr = toStr(monday);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);

  let md = `# 주간 업무 일지\n\n**${mondayStr} ~ ${toStr(sunday)}**\n**팀**: ${state.setup.teamName}\n**작성자**: ${me()?.name || ''}\n\n---\n`;

  const dailies = state.tasks.filter(t => t.type === 'daily');
  const weeklies = state.tasks.filter(t => t.type === 'weekly');

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const dStr = toStr(d);
    const label = `${d.getMonth()+1}/${d.getDate()} (${['월','화','수','목','금','토','일'][i]})`;
    md += `\n## ${label}\n\n`;
    const dayTasks = state.tasks.filter(t => (t.type === 'oneoff' || !t.type) && t.date === dStr);
    md += `**일일 루틴**\n`;
    if (dailies.length === 0) md += `- (없음)\n`;
    dailies.forEach(t => { md += `- ${isTaskDoneOn(t, dStr) ? '✅' : '⬜'} ${t.title}${t.brandId ? ` [${brand(t.brandId)?.name}]` : ''}\n`; });
    md += `\n**주간 루틴**\n`;
    if (weeklies.length === 0) md += `- (없음)\n`;
    weeklies.forEach(t => { md += `- ${isTaskDoneOn(t, dStr) ? '✅' : '⬜'} ${t.title}${t.brandId ? ` [${brand(t.brandId)?.name}]` : ''}\n`; });
    md += `\n**업무**\n`;
    if (dayTasks.length === 0) md += `- (없음)\n`;
    dayTasks.forEach(t => { md += `- ${isTaskDoneOn(t, dStr) ? '✅' : '⬜'} ${t.title}${t.brandId ? ` [${brand(t.brandId)?.name}]` : ''}\n`; });
    const note = state.dailyNotes?.[dStr];
    if (note) md += `\n> 📝 ${note.replace(/\n/g, '\n> ')}\n`;
  }

  md += `\n---\n## 장기 프로젝트\n`;
  const longs = state.tasks.filter(t => t.type === 'longterm');
  if (longs.length === 0) md += `- (없음)\n`;
  longs.forEach(t => { md += `- ${t.status === 'done' ? '✅' : '🔄'} ${t.title}${t.brandId ? ` [${brand(t.brandId)?.name}]` : ''}\n`; });

  if (state.pinnedMemo) md += `\n---\n## 📌 고정 메모\n${state.pinnedMemo}\n`;

  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `주간업무일지_${mondayStr}.md`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ====== EVENT DELEGATION ======
document.addEventListener('click', async (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const id = target.dataset.id;

  switch (action) {
    case 'setup-complete': return actionSetupComplete();
    case 'login': return actionLogin(id);
    case 'logout': return actionLogout();
    case 'reset-setup': return actionResetSetup();
    case 'reset-all': return actionResetAll();
    case 'nav': {
      const newView = target.dataset.view;
      // Reset transient KPI accordion state when leaving the KPI page
      if (session.view === 'kpis' && newView !== 'kpis') {
        window._kpiOpen = null;
      }
      // Also reset when ENTERING KPI page (so navigating to KPI = all collapsed)
      if (newView === 'kpis') {
        window._kpiOpen = null;
      }
      session.view = newView;
      return render();
    }
    case 'close-modal': return closeModal();

    case 'new-task': return openTaskModal();
    case 'open-task': {
      const t = state.tasks.find(x => x.id === id);
      // If task is linked to an existing project, open the project modal instead
      // so user sees it in project context. Standalone tasks use the single-task modal.
      if (t && t.projectId) {
        const proj = state.projects.find(p => p.id === t.projectId);
        if (proj) return openProjectModal(proj.id);
      }
      return openTaskModal(id);
    }
    case 'save-task': return actionSaveTask(id);
    case 'delete-task': return actionDeleteTask(id);
    case 'toggle-done': return actionToggleDone(id, target.dataset.date);
    case 'cycle-priority': return actionCyclePriority(id);
    case 'toggle-bookmark': return actionToggleBookmark(id);
    case 'delete-task-quick': return actionDeleteTaskQuick(id);
    case 'new-task-of-type': return actionNewTaskOfType(target.dataset.type, target.dataset.date);
    case 'select-date': return actionSelectDate(target.dataset.date);
    case 'cal-prev': return actionCalShift(-1);
    case 'cal-next': return actionCalShift(1);
    case 'download-weekly': return actionDownloadWeekly();
    case 'filter-tasks': {
      session.filter.tasks = session.filter.tasks || { who: 'all', status: 'all' };
      session.filter.tasks[target.dataset.key] = target.dataset.val;
      return render();
    }

    case 'new-project': return openProjectModal();
    case 'open-project': return actionSelectProject(id);
    case 'open-project-modal': return openProjectModal(id);
    case 'select-project': return actionSelectProject(id);
    case 'goto-project': {
      const proj = state.projects.find(p => p.id === id);
      if (!proj) return;
      session.view = 'projects';
      // Pick the best filter so the project is visible AND view looks right:
      // - done → 완료됨 탭
      // - paused → 보류 탭
      // - active → 'mine' if I'm assigned, else its brand tab (or 'all' fallback)
      const meId = session.currentUserId;
      const isMine = state.tasks.some(t => t.projectId === id && t.assigneeId === meId);
      if (proj.status === 'done') session.projectBrandFilter = 'done';
      else if (proj.status === 'paused') session.projectBrandFilter = 'paused';
      else if (isMine) session.projectBrandFilter = 'mine';
      else if (proj.brandId) session.projectBrandFilter = proj.brandId;
      else session.projectBrandFilter = 'all';
      // If landing on 'mine' and the project happens to be hidden, temporarily reveal it
      if (session.projectBrandFilter === 'mine') {
        const hidden = state.hiddenProjectsByUser?.[meId] || [];
        if (hidden.includes(id)) session.showHiddenInMine = true;
      }
      session.selectedProjectId = id;
      return render();
    }
    case 'pj-tab': return actionPjTab(target.dataset.tab);
    case 'pj-filter': return actionPjFilter(target.dataset.brand);
    case 'done-brand-filter': {
      session.doneBrandFilter = id;
      session.selectedProjectId = null;
      return render();
    }
    case 'toggle-show-hidden': {
      session.showHiddenInMine = !session.showHiddenInMine;
      return render();
    }
    case 'toggle-mine-brand': {
      window._mineBrandCollapsed = window._mineBrandCollapsed || new Set();
      if (window._mineBrandCollapsed.has(id)) window._mineBrandCollapsed.delete(id);
      else window._mineBrandCollapsed.add(id);
      return render();
    }
    case 'hide-project': {
      const meId = session.currentUserId;
      if (!state.hiddenProjectsByUser[meId]) state.hiddenProjectsByUser[meId] = [];
      if (!state.hiddenProjectsByUser[meId].includes(id)) {
        state.hiddenProjectsByUser[meId].push(id);
        if (session.selectedProjectId === id) session.selectedProjectId = null;
        await saveState();
      }
      return render();
    }
    case 'unhide-project': {
      const meId = session.currentUserId;
      if (state.hiddenProjectsByUser[meId]) {
        state.hiddenProjectsByUser[meId] = state.hiddenProjectsByUser[meId].filter(pid => pid !== id);
        await saveState();
      }
      return render();
    }
    case 'kpi-filter': return actionKpiFilter(target.dataset.brand);
    case 'complete-project': return actionCompleteProject(id);
    case 'reopen-project': return actionReopenProject(id);
    case 'pause-project': return actionPauseProject(id);
    case 'resume-project': return actionResumeProject(id);
    case 'save-project': return actionSaveProject(id);
    case 'delete-project': return actionDeleteProject(id);
    case 'add-note': return actionAddNote(id);
    case 'delete-note': return actionDeleteNote(target.dataset.pid, id);
    case 'add-comment': return actionAddComment(id);
    case 'delete-comment': return actionDeleteComment(target.dataset.pid, id);
    case 'add-task-to-project': closeModal(); session.filter.tasks = { who: 'all', status: 'all' };
      // Open new task modal with project preselected
      setTimeout(() => {
        openTaskModal();
        setTimeout(() => { const sel = document.querySelector('select[name="projectId"]'); if (sel) sel.value = id; }, 50);
      }, 50);
      return;

    case 'new-meeting': return openMeetingModal();
    case 'open-meeting': return openMeetingModal(id);
    case 'select-meeting':
      session.selectedMeetingId = id;
      session.meetingListMode = false;
      return render();
    case 'deselect-meeting':
      session.selectedMeetingId = null;
      session.meetingListMode = true;
      return render();
    case 'save-meeting': return actionSaveMeeting(id);
    case 'delete-meeting': return actionDeleteMeeting(id);
    case 'add-action': return actionAddActionItem(target.dataset.meeting);
    case 'remove-action': return actionRemoveActionItem(target.dataset.meeting, target.dataset.aid);
    case 'toggle-action': return actionToggleActionItem(target.dataset.meeting, target.dataset.aid);
    case 'convert-action': return actionConvertActionToTask(target.dataset.meeting, target.dataset.aid);

    case 'new-request': return openRequestModal();
    case 'open-request': return openRequestModal(id);
    case 'save-request': return actionSaveRequest(id);
    case 'delete-request': return actionDeleteRequest(id);
    case 'complete-request-quick': return actionCompleteRequestQuick(id);

    case 'goals-toggle-project': return actionGoalsToggleProject(target.dataset.pid);
    case 'export-goals-image': return actionExportGoalsImage();

    case 'tg-view-year': return actionTgViewYear(id, target.dataset.year);
    case 'tg-add-year': return actionTgAddYear(id);
    case 'tg-open-edit': return openTeamGoalEditModal(id, target.dataset.year);
    case 'tg-save': return actionTgSave(id);
    case 'tg-delete-year': return actionTgDeleteYear(id, target.dataset.year);
    case 'filter-requests': {
      session.filter.requests = session.filter.requests || { status: 'all' };
      session.filter.requests[target.dataset.key] = target.dataset.val;
      return render();
    }

    case 'new-kpi': return openKPIModal();
    case 'open-kpi': closeModal(); return openKPIModal(id);
    case 'save-kpi': return actionSaveKPI(id);
    case 'delete-kpi': return actionDeleteKPI(id);
    case 'edit-brand-goal': return openBrandGoalModal(id);
    case 'save-brand-goal': return actionSaveBrandGoal(id);

    case 'kpi-item-toggle': {
      // Use transient (in-memory) state — always starts collapsed on page load
      window._kpiOpen = window._kpiOpen || new Set();
      if (window._kpiOpen.has(id)) window._kpiOpen.delete(id);
      else window._kpiOpen.add(id);
      return render();
    }
    case 'kpi-collapse-all': {
      window._kpiOpen = null;
      return render();
    }
    case 'kpi-card-detail': {
      session.kpiBrandFilter = id;
      window._kpiOpen = null;
      return render();
    }
    case 'new-kpi-for-brand': {
      session.kpiDefaultBrand = id;
      return openKPIModal();
    }

    case 'new-template': return openTemplateModal();
    case 'tpl-edit': return openTemplateModal(id);
    case 'tpl-save': return actionTplSave(id);
    case 'tpl-delete': return actionTplDelete(id);
    case 'tpl-filter': return actionTplFilter(id);
    case 'tpl-add-line': return actionTplAddLine();
    case 'tpl-remove-line': return actionTplRemoveLine(target.dataset.idx);
    case 'tpl-pick': return actionTplPick(id);

    case 'trash-restore': return actionTrashRestore(id);
    case 'trash-purge': return actionTrashPurge(id);
    case 'trash-empty-all': return actionTrashEmptyAll();
    case 'trash-filter': return actionTrashFilter(id);

    case 'backup-download': return actionBackupDownload();

    case 'save-member': return actionSaveMember(id);
    case 'save-team-name': return actionSaveTeamName();

    case 'add-brand': return actionAddBrand();
    case 'save-brand': return actionSaveBrand(id);
    case 'delete-brand': return actionDeleteBrand(id);
    case 'filter-by-brand': return actionFilterByBrand(id);
  }
});

// Blur/input handlers for inline-save elements
document.addEventListener('blur', (e) => {
  const el = e.target;
  if (el.dataset && el.dataset.saveNote) actionSaveDailyNote(el.dataset.saveNote, el.value);
  else if (el.dataset && el.dataset.saveMemo) actionSavePinnedMemo(el.value);
}, true);
document.addEventListener('input', (e) => {
  const el = e.target;
  if (el.dataset && el.dataset.searchTasks) {
    session.taskSearch = el.value;
    clearTimeout(window._searchTimer);
    window._searchTimer = setTimeout(() => render(), 200);
  }
  if (el.dataset && el.dataset.meetingSearch) {
    session.meetingFilter = session.meetingFilter || { type: 'all', period: 'all', q: '' };
    session.meetingFilter.q = el.value;
    clearTimeout(window._mSearchTimer);
    window._mSearchTimer = setTimeout(() => render(), 200);
  }
});

document.addEventListener('change', (e) => {
  const el = e.target;
  if (el.dataset && el.dataset.meetingFilter) {
    session.meetingFilter = session.meetingFilter || { type: 'all', period: 'all', q: '' };
    session.meetingFilter[el.dataset.meetingFilter] = el.value;
    render();
  }
  if (el.dataset && el.dataset.inlineDate) {
    const t = state.tasks.find(x => x.id === el.dataset.inlineDate);
    if (t) {
      t.date = el.value || null;
      t.updatedAt = now();
      saveState();
    }
  }
});

// Inline title save on blur (project detail sub-tasks)
document.addEventListener('blur', (e) => {
  const el = e.target;
  if (el.dataset && el.dataset.inlineTitle) {
    const t = state.tasks.find(x => x.id === el.dataset.inlineTitle);
    if (t && el.value.trim() && t.title !== el.value.trim()) {
      t.title = el.value.trim();
      t.updatedAt = now();
      saveState();
    } else if (t && !el.value.trim()) {
      // revert empty edit
      el.value = t.title;
    }
    // Return to readonly view mode
    el.setAttribute('readonly', '');
  }
}, true);

// Double-click to enter edit mode
document.addEventListener('dblclick', (e) => {
  const el = e.target;
  if (el.dataset && el.dataset.inlineTitle) {
    el.removeAttribute('readonly');
    el.focus();
    el.select();
  }
});

// Submit-on-enter for forms
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && session.modal) closeModal();
  const el = e.target;
  if (e.key === 'Enter' && !e.shiftKey) {
    if (el.dataset && el.dataset.quickAddTask) {
      e.preventDefault();
      const projectId = el.dataset.quickAddTask;
      const val = el.value;
      el.value = '';
      actionQuickAddTask(projectId, val);
    } else if (el.dataset && el.dataset.quickAddMeeting) {
      e.preventDefault();
      const projectId = el.dataset.quickAddMeeting;
      const val = el.value;
      el.value = '';
      actionQuickAddMeeting(projectId, val);
    } else if (el.dataset && el.dataset.inlineTitle) {
      e.preventDefault();
      el.blur(); // triggers save via blur handler
    } else if (el.id === 'pj-comment-input') {
      e.preventDefault();
      const activeProject = state.projects.find(p => p.id === session.selectedProjectId);
      if (activeProject) actionAddComment(activeProject.id);
    }
  }
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    if (el.id === 'pj-note-input') {
      e.preventDefault();
      const activeProject = state.projects.find(p => p.id === session.selectedProjectId);
      if (activeProject) actionAddNote(activeProject.id);
    }
  }
});

// ====== INIT ======
(async function init() {
  try {
    await loadState();
    await loadSession();
    await rolloverTasks();
    render();

    // Subscribe to realtime updates from other team members
    if (storageAdapter.subscribe) {
      let isFirstSnapshot = true;
      storageAdapter.subscribe(async (jsonStr) => {
        // Skip first snapshot (we just loaded it)
        if (isFirstSnapshot) { isFirstSnapshot = false; return; }
        try {
          const incoming = JSON.parse(jsonStr);
          // Don't overwrite if we have unsaved pending writes
          if (_pendingState) return;
          // Update state with remote changes
          Object.assign(state, incoming);
          // Re-render but preserve current view/modal
          render();
        } catch (e) { console.warn('Realtime update parse failed', e); }
      });
    }
  } catch (e) {
    console.error('Init failed', e);
    document.getElementById('app').innerHTML = '<div class="loading">오류가 발생했어요. 새로고침해 주세요.</div>';
  }
})();
</script>
